
<!DOCTYPE html>
<html>
<head>
<title>Fill in the Blank - Game Creator</title>
<style>
body { font-family: Arial, sans-serif; max-width: 900px; margin: 50px auto; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
.screen { display: none; background: white; padding: 40px; border-radius: 20px; }
.screen.active { display: block; }
.word { display: inline; cursor: pointer; padding: 2px 4px; border-radius: 3px; }
.word:hover { background: #e0e0e0; }
.word.selected { background: #a7c7e7; border: 2px solid #4169e1; padding: 2px 2px; }
button { padding: 12px 24px; margin: 10px 5px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; background: #6366f1; color: white; font-weight: 600; }
button:hover { background: #4f46e5; }
button.secondary { background: #e5e7eb; color: #374151; }
button.success { background: #10b981; color: white; }
#selectableText { line-height: 2.2; font-size: 18px; margin: 20px 0; padding: 20px; border: 2px solid #ccc; border-radius: 12px; min-height: 150px; }
.blank { display: inline-block; min-width: 100px; border-bottom: 2px dashed #333; padding: 4px 8px; margin: 0 4px; cursor: pointer; background: #f9f9f9; border-radius: 4px; }
.blank:hover { background: #fef3c7; }
.blank.filled { background: #d1fae5; border-bottom: 2px solid #10b981; color: #059669; font-weight: 600; }
.word-item { display: inline-block; padding: 10px 20px; margin: 5px; background: #f0f0f0; border: 2px solid #333; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
.word-item:hover { background: #e0e7ff; transform: translateY(-2px); }
.word-item.used { opacity: 0.3; text-decoration: line-through; cursor: not-allowed; }
#wordBank { margin: 20px 0; padding: 20px; border: 2px solid #ccc; border-radius: 12px; background: #f9fafb; }
h1 { color: #6366f1; margin-bottom: 10px; }
input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
textarea { min-height: 150px; font-family: Arial, sans-serif; }
label { font-weight: 600; color: #374151; display: block; margin-top: 15px; }
select { width: 100%; padding: 10px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
.mode-btn { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-size: 16px; transition: all 0.2s; }
.mode-btn:hover { border-color: #6366f1; }
.mode-btn.active { background: #6366f1; color: white; border-color: #6366f1; }
</style>
</head>
<body>

<div id="setupScreen" class="screen active">
  <h1>🎮 Fill in the Blank - Game Creator</h1>
  <p style="color: #6b7280; margin-bottom: 20px;">Create an interactive learning game for your students</p>
  
  <div style="margin-bottom: 20px; padding: 15px; background: #f0fdf4; border: 2px solid #86efac; border-radius: 8px;">
    <label style="font-weight: 600; color: #166534; margin-bottom: 10px;">📁 Load Existing Game:</label>
    <input type="file" id="rehydrateFile" accept=".html" onchange="rehydrateGame()" style="margin-top: 10px;">
    <p style="font-size: 0.85rem; color: #15803d; margin-top: 5px;">Upload a previously downloaded student game to edit it</p>
  </div>
  
  <label>Game Title:</label>
  <input type="text" id="gameTitle" placeholder="Enter a title for your game">
  
  <label>Display Mode:</label>
  <div style="display: flex; gap: 10px; margin: 10px 0;">
    <button type="button" class="mode-btn active" onclick="selectMode('paragraph')" data-mode="paragraph">
      📄 Full Paragraph
    </button>
    <button type="button" class="mode-btn" onclick="selectMode('sentence')" data-mode="sentence">
      📝 Sentence-by-Sentence
    </button>
  </div>
  
  <label>Difficulty:</label>
  <select id="difficulty">
    <option value="easy">Easy - Show all words</option>
    <option value="medium">Medium - Show hints (first letter)</option>
    <option value="hard">Hard - Type answers (no word bank)</option>
  </select>
  
  <label>Number of Distractors (wrong answer choices):</label>
  <input type="number" id="distractors" min="0" max="10" value="2">
  
  <label>Your Text:</label>
  <textarea id="gameText" placeholder="Paste or type your text here...">When you set a goal you should think clearly about what and when. Imagine that you are a member of the school band.</textarea>
  
  <button onclick="loadText()">Next: Select Words & Phrases →</button>
</div>

<div id="selectionScreen" class="screen">
  <h1>Select Words & Phrases</h1>
  <p style="color: #6b7280; margin-bottom: 15px;">Click a word to select it, or click and drag to select a phrase</p>
  <div id="selectableText"></div>
  <div style="margin-top: 20px;">
    <button class="secondary" onclick="clearAll()">Clear All</button>
    <button onclick="generateGame()">Preview Game</button>
    <button class="success" onclick="downloadGame()">📥 Download for Students</button>
  </div>
</div>

<div id="gameScreen" class="screen">
  <h1 id="gameTitle2"></h1>
  <div id="sentenceDisplay"></div>
  <div id="wordBank"></div>
  <button class="secondary" onclick="backToSelection()">← Back to Selection</button>
</div>

<script>
let gameData = {
  title: '',
  rawText: '',
  tokens: [],
  blankGroups: [],
  nextKey: 1,
  sentences: [],
  usedWords: new Set(),
  displayMode: 'paragraph',
  difficulty: 'easy',
  distractorCount: 2,
  currentSentence: 0
};

let dragStart = null;
let isDragging = false;
let selectedBlank = null;

function selectMode(mode) {
  gameData.displayMode = mode;
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
}

function loadText() {
  const title = document.getElementById('gameTitle').value.trim() || 'Fill in the Blanks';
  const text = document.getElementById('gameText').value.trim();
  if (!text) { alert('Enter text first!'); return; }
  
  gameData.title = title;
  gameData.rawText = text;
  gameData.difficulty = document.getElementById('difficulty').value;
  gameData.distractorCount = parseInt(document.getElementById('distractors').value);
  gameData.tokens = [];
  gameData.blankGroups = [];
  
  const re = /(\s+)/g;
  let last = 0, idx = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) gameData.tokens.push({ text: text.slice(last, m.index), isSpace: false, index: idx++ });
    gameData.tokens.push({ text: m[0], isSpace: true, index: idx++ });
    last = m.index + m[0].length;
  }
  if (last < text.length) gameData.tokens.push({ text: text.slice(last), isSpace: false, index: idx++ });
  
  renderSelection();
  document.getElementById('setupScreen').classList.remove('active');
  document.getElementById('selectionScreen').classList.add('active');
}

function renderSelection() {
  const container = document.getElementById('selectableText');
  container.innerHTML = '';
  
  gameData.tokens.forEach(tok => {
    if (tok.isSpace) {
      if (tok.text.includes('\n')) container.appendChild(document.createElement('br'));
      else container.appendChild(document.createTextNode(tok.text));
    } else {
      const span = document.createElement('span');
      span.className = 'word';
      span.dataset.idx = tok.index;
      span.textContent = tok.text;
      
      const inGroup = gameData.blankGroups.find(g => g.indices.includes(tok.index));
      if (inGroup) span.classList.add('selected');
      
      span.addEventListener('mousedown', e => { 
        if (inGroup) {
          gameData.blankGroups = gameData.blankGroups.filter(g => g.key !== inGroup.key);
          renderSelection();
          return;
        }
        dragStart = tok.index; 
        isDragging = true; 
        e.preventDefault(); 
      });
      
      span.addEventListener('mouseup', e => {
        if (isDragging && dragStart === tok.index && !inGroup) {
          gameData.blankGroups.push({
            key: String(gameData.nextKey++),
            indices: [tok.index],
            text: tok.text
          });
          renderSelection();
          isDragging = false;
          dragStart = null;
          e.stopPropagation();
        }
      });
      
      span.addEventListener('mouseenter', () => { 
        if (isDragging && dragStart !== null && dragStart !== tok.index) {
          highlightRange(dragStart, tok.index); 
        }
      });
      
      container.appendChild(span);
    }
  });
  
  document.addEventListener('mouseup', () => {
    if (isDragging && dragStart !== null) createBlank();
    isDragging = false;
    dragStart = null;
  });
}

function highlightRange(start, end) {
  const min = Math.min(start, end);
  const max = Math.max(start, end);
  document.querySelectorAll('.word').forEach(w => {
    const idx = parseInt(w.dataset.idx);
    w.style.background = (idx >= min && idx <= max) ? 'rgba(99, 102, 241, 0.3)' : '';
  });
}

function createBlank() {
  const selectedIndices = [];
  document.querySelectorAll('.word').forEach(w => {
    if (w.style.background) selectedIndices.push(parseInt(w.dataset.idx));
  });
  
  if (selectedIndices.length === 0) return;
  
  selectedIndices.sort((a, b) => a - b);
  const text = selectedIndices.map(i => gameData.tokens.find(t => t.index === i).text).join(' ');
  
  gameData.blankGroups.push({
    key: String(gameData.nextKey++),
    indices: selectedIndices,
    text: text
  });
  
  renderSelection();
}

function clearAll() {
  gameData.blankGroups = [];
  renderSelection();
}

function generateGame() {
  if (gameData.blankGroups.length === 0) { alert('Select at least one word or phrase!'); return; }
  
  const tokenToWordPos = new Map();
  let wordPos = 0;
  gameData.tokens.forEach(t => {
    if (!t.isSpace) {
      tokenToWordPos.set(t.index, wordPos);
      wordPos++;
    }
  });
  
  const allWords = gameData.tokens.filter(t => !t.isSpace).map(t => t.text);
  const allBlanks = [];
  
  gameData.blankGroups.forEach(g => {
    const sortedIndices = [...g.indices].sort((a, b) => a - b);
    const firstTokenIdx = sortedIndices[0];
    const wordPosition = tokenToWordPos.get(firstTokenIdx);
    
    allBlanks.push({
      position: wordPosition,
      text: g.text,
      wordCount: g.indices.length,
      key: g.key,
      filled: false,
      userAnswer: null
    });
  });
  
  allBlanks.sort((a, b) => a.position - b.position);
  
  // Build sentences based on mode
  if (gameData.displayMode === 'sentence') {
    gameData.sentences = [];
    const sentenceRegex = /[^.!?]+[.!?]+/g;
    const rawSentences = gameData.rawText.match(sentenceRegex) || [gameData.rawText];
    
    let globalWordPos = 0;
    rawSentences.forEach(sentText => {
      const sentWords = sentText.trim().split(/\s+/);
      const sentBlanks = allBlanks.filter(b => 
        b.position >= globalWordPos && b.position < globalWordPos + sentWords.length
      ).map(b => ({ ...b, position: b.position - globalWordPos }));
      
      if (sentBlanks.length > 0) {
        gameData.sentences.push({ words: sentWords, blanks: sentBlanks, completed: false });
      }
      globalWordPos += sentWords.length;
    });
  } else {
    gameData.sentences = [{
      words: allWords,
      blanks: allBlanks,
      completed: false
    }];
  }
  
  gameData.usedWords = new Set();
  gameData.currentSentence = 0;
  
  document.getElementById('selectionScreen').classList.remove('active');
  document.getElementById('gameScreen').classList.add('active');
  document.getElementById('gameTitle2').textContent = gameData.title;
  renderGame();
}

function renderGame() {
  const sentence = gameData.sentences[gameData.currentSentence];
  const container = document.getElementById('sentenceDisplay');
  container.innerHTML = '';
  
  let wordIdx = 0;
  while (wordIdx < sentence.words.length) {
    const blank = sentence.blanks.find(b => b.position === wordIdx);
    
    if (blank) {
      const span = document.createElement('span');
      span.className = 'blank';
      span.dataset.key = blank.key;
      span.dataset.answer = blank.text;
      
      if (blank.filled) {
        span.textContent = blank.userAnswer;
        span.classList.add('filled');
      } else {
        span.innerHTML = '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;';
      }
      
      container.appendChild(span);
      wordIdx += blank.wordCount;
    } else {
      container.appendChild(document.createTextNode(' ' + sentence.words[wordIdx]));
      wordIdx++;
    }
  }
  
  renderWordBank();
  updateNavigation();
}

function updateNavigation() {
  const gameScreen = document.getElementById('gameScreen');
  let navDiv = document.getElementById('navigation');
  
  if (!navDiv) {
    navDiv = document.createElement('div');
    navDiv.id = 'navigation';
    navDiv.style.textAlign = 'center';
    navDiv.style.marginTop = '20px';
    gameScreen.insertBefore(navDiv, gameScreen.lastElementChild);
  }
  
  navDiv.innerHTML = '';
  
  if (gameData.displayMode === 'sentence') {
    const prevBtn = document.createElement('button');
    prevBtn.textContent = '← Previous';
    prevBtn.className = 'secondary';
    prevBtn.disabled = gameData.currentSentence === 0;
    prevBtn.onclick = () => {
      if (gameData.currentSentence > 0) {
        gameData.currentSentence--;
        gameData.usedWords = new Set();
        renderGame();
      }
    };
    
    const nextBtn = document.createElement('button');
    const isLast = gameData.currentSentence === gameData.sentences.length - 1;
    nextBtn.textContent = isLast ? 'Finish' : 'Next →';
    nextBtn.id = 'nextBtn';
    nextBtn.onclick = () => {
      if (gameData.currentSentence < gameData.sentences.length - 1) {
        gameData.currentSentence++;
        gameData.usedWords = new Set();
        renderGame();
      } else {
        alert('Game complete!');
      }
    };
    
    // Check if current sentence is complete
    const sentence = gameData.sentences[gameData.currentSentence];
    const allFilled = sentence.blanks.every(b => b.filled);
    nextBtn.disabled = !allFilled;
    
    navDiv.appendChild(prevBtn);
    navDiv.appendChild(nextBtn);
    
    const progress = document.createElement('p');
    progress.style.marginTop = '10px';
    progress.style.color = '#6b7280';
    progress.textContent = `Sentence ${gameData.currentSentence + 1} of ${gameData.sentences.length}`;
    navDiv.appendChild(progress);
  }
}

function renderWordBank() {
  const container = document.getElementById('wordBank');
  container.innerHTML = '<h3 style="color: #6366f1; margin-bottom: 15px;">📚 Word Bank</h3>';
  
  const sentence = gameData.sentences[gameData.currentSentence];
  const seen = new Set();
  
  sentence.blanks.forEach(b => {
    if (seen.has(b.key)) return;
    seen.add(b.key);
    
    const item = document.createElement('div');
    item.className = 'word-item';
    item.dataset.key = b.key;
    item.textContent = b.text;
    if (gameData.usedWords.has(b.key)) item.classList.add('used');
    
    item.onclick = () => {
      if (gameData.usedWords.has(b.key)) return;
      
      // Select this word
      document.querySelectorAll('.word-item').forEach(w => w.style.outline = '');
      item.style.outline = '3px solid #f59e0b';
      
      // Set up blanks to receive this word
      document.querySelectorAll('.blank').forEach(blank => {
        blank.style.cursor = 'pointer';
        blank.onclick = () => {
          const correctAnswer = blank.dataset.answer;
          
          if (b.text.toLowerCase() === correctAnswer.toLowerCase()) {
            blank.textContent = b.text;
            blank.classList.add('filled');
            
            const sentence = gameData.sentences[gameData.currentSentence];
            const blankData = sentence.blanks.find(x => x.key === blank.dataset.key);
            blankData.filled = true;
            blankData.userAnswer = b.text;
            
            gameData.usedWords.add(b.key);
            
            // Clear selection
            item.style.outline = '';
            document.querySelectorAll('.blank').forEach(b => b.onclick = null);
            
            renderWordBank();
            
            // Check if sentence is complete and enable Next button
            const allFilled = sentence.blanks.every(x => x.filled);
            if (allFilled) {
              const nextBtn = document.getElementById('nextBtn');
              if (nextBtn) nextBtn.disabled = false;
            }
          } else {
            alert('Try again!');
          }
        };
      });
    };
    
    container.appendChild(item);
  });
}

function backToSelection() {
  gameData.usedWords = new Set();
  document.getElementById('gameScreen').classList.remove('active');
  document.getElementById('selectionScreen').classList.add('active');
}

      wordPos++;
    }
  });
  
  const allWords = gameData.tokens.filter(t => !t.isSpace).map(t => t.text);

    const sortedIndices = [...g.indices].sort((a, b) => a - b);

    allBlanks.push({
      position: wordPosition,
      text: g.text,

        b.position >= globalWordPos && b.position < globalWordPos + sentWords.length
      ).map(b => ({ ...b, position: b.position - globalWordPos }));
      
      if (sentBlanks.length > 0) {
        sentences.push({ words: sentWords, blanks: sentBlanks });
      }
      globalWordPos += sentWords.length;
    });
  } else {
    sentences = [{ words: allWords, blanks: allBlanks }];
  }

function rehydrateGame() {
  const file = document.getElementById('rehydrateFile').files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    const html = e.target.result;
    
    // Extract the CFG object from the student game
    const match = html.match(/var CFG=({.*?});/);
    if (!match) {
      alert('Could not find game data in this file. Make sure it\'s a valid student game.');
      return;
    }
    
    try {
      const config = JSON.parse(match[1]);
      
      // Reconstruct the original text from sentences
      let reconstructedText = '';
      config.sentences.forEach((sen, idx) => {
        // Rebuild sentence with blanks
        let sentenceText = '';
        let wordIdx = 0;
        while (wordIdx < sen.words.length) {
          const blank = sen.blanks.find(b => b.position === wordIdx);
          if (blank) {
            sentenceText += blank.text;
            wordIdx += blank.wordCount;
          } else {
            sentenceText += sen.words[wordIdx];
            wordIdx++;
          }
          if (wordIdx < sen.words.length) sentenceText += ' ';
        }
        reconstructedText += sentenceText;
        if (idx < config.sentences.length - 1) reconstructedText += ' ';
      });
      
      // Extract title from HTML
      const titleMatch = html.match(/<title>(.*?)<\/title>/);
      const title = titleMatch ? titleMatch[1] : 'Rehydrated Game';
      
      // Populate form
      document.getElementById('gameTitle').value = title;
      document.getElementById('gameText').value = reconstructedText;
      document.getElementById('difficulty').value = config.difficulty || 'easy';
      document.getElementById('distractors').value = config.distractors || 2;
      
      // Set display mode
      gameData.displayMode = config.mode || 'paragraph';
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === gameData.displayMode);
      });
      
      // Store the blank groups to restore after tokenization
      const blanksToRestore = [];
      config.sentences.forEach(sen => {
        sen.blanks.forEach(b => {
          blanksToRestore.push({ text: b.text, wordCount: b.wordCount });
        });
      });
      
      alert('Game loaded! The text and settings have been restored. Click "Next" to review and edit the word selections.');
      
    } catch (err) {
      alert('Error reading game file: ' + err.message);
    }
  };
  reader.readAsText(file);
}
