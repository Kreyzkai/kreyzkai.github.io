<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>COMET 2 · ドリル帳</title>
  <style>
    :root {
      --cyan: #19BDD6;
      --cyan-dark: #0E8FA3;
      --navy: #003366;
      --cream: #FFFDF5;
      --cream-dark: #FFF7E0;
      --gold: #D4A017;
      --gold-dark: #B8860B;
      --rose: #E84057;
      --green: #22A06B;
      --green-dark: #1B8055;
      --bg: #F4F6F9;
      --card: #FFFFFF;
      --text: #1A1A2E;
      --text-sec: #4A4A6A;
      --text-muted: #8888A0;
      --border: #DDE0E8;
      --sidebar-w: 250px;
      --radius: 12px;
      --radius-lg: 18px;
      --zoom: 1;
      --font-en: 'Georgia', 'Times New Roman', serif;
      --font-jp: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      --font-ui: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }

    @media(prefers-color-scheme:dark) {
      :root {
        --bg: #0F1018;
        --card: #1A1B2E;
        --text: #E8E8F0;
        --text-sec: #A0A0C0;
        --text-muted: #6A6A88;
        --border: #2A2B40;
        --cream: #1E1F30;
        --cream-dark: #252640;
        --cyan: #22D4EE;
        --cyan-dark: #1AB8D0;
        --navy: #5588CC;
        --navy-light: #6699DD;
      }
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      font-size: calc(16px*var(--zoom));
      scroll-behavior: smooth
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh
    }

    @media(prefers-reduced-motion:reduce) {

      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important
      }
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 20px 48px
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      padding: 14px 20px;
      background: var(--card);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border)
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      outline: none;
      border-radius: var(--radius);
      padding: 4px;
      margin: -4px;
      text-decoration: none;
      transition: opacity .15s
    }

    .brand:hover {
      opacity: .8
    }

    .brand:focus-visible {
      box-shadow: 0 0 0 3px rgba(25, 189, 214, .3)
    }

    .brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--cyan), var(--cyan-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: white;
      font-weight: 900
    }

    .brand-text h1 {
      font-size: 1.1rem;
      font-weight: 800;
      line-height: 1.2;
      color: var(--text)
    }

    .brand-text span {
      font-size: .7rem;
      color: var(--text-sec);
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase
    }

    .header-actions {
      display: flex;
      gap: 6px;
      align-items: center
    }

    .lang-switch {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
      font-size: .78rem;
      font-weight: 700;
    }
    .lang-switch button {
      padding: 6px 14px;
      border: none;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: all .15s;
      font-family: var(--font-ui);
    }
    .lang-switch button.active {
      background: var(--cyan);
      color: white;
    }
    .lang-switch button:hover:not(.active) {
      background: var(--cream);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 14px;
      font-size: .82rem;
      font-weight: 600;
      font-family: var(--font-ui);
      cursor: pointer;
      color: var(--text);
      background: var(--card);
      transition: all .15s;
      white-space: nowrap;
      outline: none
    }

    .btn:hover {
      background: var(--cream);
      border-color: var(--border);
      transform: translateY(-1px)
    }

    .btn:focus-visible {
      box-shadow: 0 0 0 3px rgba(25, 189, 214, .3)
    }

    .btn:active {
      transform: translateY(0) scale(.97)
    }

    .btn-icon {
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 50%
    }

    .btn-primary {
      background: var(--cyan);
      color: white;
      border-color: transparent;
      box-shadow: 0 3px 10px rgba(25, 189, 214, .25)
    }

    .btn-primary:hover {
      background: var(--cyan-dark)
    }

    .btn-gold {
      background: var(--gold);
      color: #3B2200;
      border-color: transparent;
      box-shadow: 0 3px 10px rgba(212, 160, 23, .25)
    }

    .btn-gold:hover {
      background: var(--gold-dark)
    }

    .btn-ghost {
      background: transparent;
      border-color: transparent;
      box-shadow: none
    }

    .grid {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      gap: 16px;
      align-items: start
    }

    .grid.collapsed {
      grid-template-columns: 1fr
    }

    .grid.collapsed .sidebar {
      display: none
    }

    .sidebar {
      position: sticky;
      top: 12px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      background: var(--card);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--text-muted) transparent
    }

    .sidebar::-webkit-scrollbar {
      width: 4px
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 4px
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: -14px;
      background: var(--card);
      z-index: 2;
      padding-top: 4px
    }

    .sidebar-header h3 {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-sec);
      font-weight: 700
    }

    .part-btn {
      display: block;
      width: 100%;
      text-align: left;
      border: 1.5px solid var(--border);
      background: var(--card);
      border-radius: var(--radius);
      padding: 8px 10px;
      margin-bottom: 5px;
      font-size: .78rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: all .15s;
      font-family: var(--font-ui);
      outline: none;
      line-height: 1.3;
      min-height: 52px
    }

    .part-btn:hover {
      border-color: var(--cyan);
      background: var(--cream);
      transform: translateX(2px)
    }

    .part-btn:focus-visible {
      box-shadow: 0 0 0 3px rgba(25, 189, 214, .3)
    }

    .part-btn.active {
      background: linear-gradient(135deg, rgba(25, 189, 214, .1), rgba(25, 189, 214, .05));
      border-color: var(--cyan);
      color: var(--cyan-dark)
    }

    .part-btn .part-id {
      font-size: .62rem;
      color: var(--text-muted);
      letter-spacing: .5px;
      font-weight: 700;
      display: block;
      margin-bottom: 1px
    }

    .part-btn.active .part-id {
      color: var(--cyan-dark)
    }

    .part-btn .part-jp {
      font-size: .65rem;
      color: var(--text-muted);
      display: block;
      font-family: var(--font-jp)
    }

    .show-sidebar {
      display: none;
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .2)
    }

    @media(max-width:850px) {
      .show-sidebar {
        display: inline-flex
      }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 16px
    }

    .breadcrumb {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .75rem;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 12px;
      font-family: var(--font-ui)
    }

    .breadcrumb:hover {
      color: var(--cyan)
    }

    .breadcrumb-sep {
      opacity: .4
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 78px;
      height: 58px;
      border-radius: 16px;
      background: var(--navy);
      color: white;
      font-size: 1.3rem;
      font-weight: 900;
      font-family: var(--font-ui);
      letter-spacing: .5px;
      margin-bottom: 8px
    }

    .number-title {
      font-size: 1rem;
      font-weight: 900;
      color: var(--navy);
      margin: 12px 0 4px;
      letter-spacing: .01em;
      font-family: var(--font-jp)
    }

    .jp-title {
      font-size: 1.8rem;
      color: var(--cyan-dark);
      margin: 8px 0 24px;
      font-weight: 900;
      font-family: var(--font-jp)
    }

    /* Lesson Panel */
    .lesson-panel {
      background: var(--cream);
      border-top: 12px solid var(--cyan);
      border-left: 1px solid rgba(25, 189, 214, .2);
      border-right: 1px solid rgba(25, 189, 214, .2);
      border-bottom: 1px solid rgba(25, 189, 214, .2);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
      padding: 20px 22px
    }

    .ex-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin: 14px 0;
      padding: 8px 0
    }

    .ex-num {
      flex-shrink: 0;
      background: var(--cyan);
      color: white;
      min-width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .9rem;
      font-weight: 800
    }

    .ex-en {
      font-family: var(--font-en);
      font-size: 1.2rem;
      font-weight: 700;
      color: #13214A;
      line-height: 1.5;
      white-space: normal;
    }

    .ex-en mark,
    .ex-en .highlight {
      background: transparent;
      color: var(--cyan);
      font-weight: 900;
      padding: 0 2px;
      display: inline;
    }

    /* Robust spacing guarantee for marked grammar highlights */
    .ex-en mark::before,
    .ex-en mark::after,
    .ex-en .highlight::before,
    .ex-en .highlight::after {
      content: " ";
    }

    .ex-jp {
      font-family: var(--font-jp);
      font-size: .88rem;
      color: var(--text-sec);
      margin-top: 3px;
      line-height: 1.6
    }

    /* Language mode visibility rules */
    body[data-lang="en"] .ex-jp,
    body[data-lang="en"] .jp-box,
    body[data-lang="en"] .jp-title,
    body[data-lang="en"] .note,
    body[data-lang="en"] .explanation-intro,
    body[data-lang="en"] .formula-box,
    body[data-lang="en"] .comparison-box {
      display: none !important;
    }

    body[data-lang="jp"] .ex-en {
      display: none !important;
    }
    body[data-lang="jp"] .ex-jp {
      font-size: 1.05rem;
      color: var(--text);
      font-weight: 600;
    }

    .pdf-divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0 10px
    }

    .note {
      background: var(--cream-dark);
      border: 1px solid #EADFBD;
      border-radius: var(--radius);
      padding: 12px 16px;
      margin: 10px 0;
      font-size: .95rem;
      line-height: 1.7;
      color: #17264A;
      font-family: var(--font-jp)
    }

    @media(prefers-color-scheme:dark) {
      .note {
        background: #252026;
        border-color: #4A3F20;
        color: #E0C86E
      }
    }

    /* Explanation Box */
    .explanation-box {
      margin: 16px 0
    }

    .explanation-intro {
      font-family: var(--font-jp);
      font-size: .95rem;
      line-height: 1.8;
      color: #13214A;
      margin-bottom: 14px;
      padding: 12px 16px;
      background: rgba(25, 189, 214, .04);
      border-radius: var(--radius);
      border-left: 4px solid var(--cyan)
    }

    @media(prefers-color-scheme:dark) {
      .explanation-intro {
        color: var(--text-sec);
        background: rgba(25, 189, 214, .06)
      }
    }

    .formula-box {
      background: var(--cream-dark);
      border: 1px solid #EADFBD;
      border-radius: var(--radius);
      padding: 10px 16px;
      margin: 8px 0;
      font-family: var(--font-jp)
    }

    @media(prefers-color-scheme:dark) {
      .formula-box {
        background: #252026;
        border-color: #4A3F20
      }
    }

    .formula-row {
      display: flex;
      gap: 12px;
      align-items: baseline;
      padding: 6px 0;
      border-bottom: 1px solid rgba(0, 0, 0, .06);
      flex-wrap: wrap
    }

    .formula-row:last-child {
      border-bottom: none
    }

    .formula-pattern {
      font-weight: 800;
      color: var(--navy);
      font-size: .92rem;
      min-width: 200px
    }

    .formula-meaning {
      color: var(--text-sec);
      font-size: .88rem
    }

    .comparison-box {
      margin: 10px 0;
      padding: 10px 16px;
      background: rgba(255, 215, 0, .06);
      border: 1px solid rgba(212, 160, 23, .2);
      border-radius: var(--radius)
    }

    @media(prefers-color-scheme:dark) {
      .comparison-box {
        background: rgba(212, 160, 23, .08);
        border-color: rgba(212, 160, 23, .25)
      }
    }

    .comp-item {
      padding: 4px 0;
      font-size: .88rem;
      line-height: 1.6
    }

    .comp-en {
      font-family: var(--font-en);
      font-weight: 700;
      color: #13214A
    }

    .comp-note {
      font-family: var(--font-jp);
      color: var(--text-sec);
      font-size: .82rem
    }

    /* Section Cards */
    .section-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px
    }

    .section-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      transition: all .15s
    }

    .section-card:hover {
      border-color: var(--cyan)
    }

    .section-card h4 {
      font-size: 1rem;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 8px
    }

    .section-card p {
      font-size: .82rem;
      color: var(--text-sec);
      margin-bottom: 10px
    }

    /* Instruction Page (prominent) */
    .instruction-page {
      padding: 20px 0
    }

    .instruction-page h3 {
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--navy);
      margin-bottom: 16px;
      font-family: var(--font-jp)
    }

    .instruction-text {
      background: rgba(25, 189, 214, .06);
      border-left: 5px solid var(--cyan);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 14px 18px;
      margin: 16px 0;
      font-size: 1rem;
      line-height: 1.7;
      font-weight: 600;
      color: #16315E;
      font-family: var(--font-jp)
    }

    .sample-box {
      background: var(--cream-dark);
      border: 2px solid #EADFBD;
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      margin: 16px 0;
      font-size: 1rem;
      line-height: 1.7;
      color: #17264A
    }

    .sample-label {
      display: inline-block;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      font-weight: 900;
      color: var(--cyan-dark);
      margin-bottom: 6px;
      font-family: var(--font-ui)
    }

    .sample-en {
      font-family: var(--font-en);
      font-size: 1.15rem;
      font-weight: 700;
      color: #13214A;
      margin: 6px 0
    }

    .sample-answer {
      font-weight: 900;
      color: var(--navy);
      border-bottom: 3px solid var(--cyan)
    }

    .sample-jp {
      font-family: var(--font-jp);
      font-size: .9rem;
      color: var(--text-sec);
      margin-top: 4px
    }

    /* Quiz UI */
    .q-counter {
      font-size: .78rem;
      color: var(--text-muted);
      font-weight: 700;
      letter-spacing: .3px;
      margin-bottom: 6px
    }

    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      margin-bottom: 16px;
      overflow: hidden
    }

    .progress-fill {
      height: 100%;
      background: var(--cyan);
      border-radius: 4px;
      transition: width .3s
    }

    .prompt {
      font-family: var(--font-en);
      font-size: 1.15rem;
      font-weight: 700;
      color: #13214A;
      margin: 12px 0 16px;
      line-height: 1.6
    }

    .jp-box {
      font-family: var(--font-jp);
      font-size: .88rem;
      color: var(--text-sec);
      margin-bottom: 8px;
      padding: 8px 12px;
      background: rgba(25, 189, 214, .04);
      border-radius: var(--radius);
      border-left: 3px solid var(--cyan)
    }

    .option-btn {
      display: block;
      width: 100%;
      text-align: left;
      border: 2px solid var(--border);
      background: var(--card);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 8px;
      font-size: .95rem;
      font-weight: 600;
      font-family: var(--font-ui);
      cursor: pointer;
      transition: all .15s;
      outline: none;
      color: var(--text)
    }

    .option-btn:hover {
      border-color: var(--cyan);
      background: var(--cream)
    }

    .option-btn:focus-visible {
      box-shadow: 0 0 0 3px rgba(25, 189, 214, .3)
    }

    .option-btn.correct {
      border-color: var(--green);
      background: rgba(34, 160, 107, .08);
      color: var(--green-dark)
    }

    .option-btn.wrong {
      border-color: var(--rose);
      background: rgba(232, 64, 87, .06);
      color: var(--rose);
      opacity: .7
    }

    .build-area {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 48px;
      padding: 10px 12px;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      align-items: center;
      background: var(--cream);
      transition: all .15s
    }

    .build-area.empty::after {
      content: 'タップして語句を並べよう';
      color: var(--text-muted);
      font-size: .82rem;
      font-family: var(--font-jp)
    }

    .bank-area {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      border-radius: 999px;
      border: 2px solid var(--border);
      background: var(--card);
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      font-family: var(--font-ui);
      color: var(--text);
      outline: none
    }

    .chip:hover:not(.used) {
      border-color: var(--cyan);
      background: var(--cream)
    }

    .chip:focus-visible {
      box-shadow: 0 0 0 3px rgba(25, 189, 214, .3)
    }

    .chip.used {
      opacity: .3;
      cursor: default
    }

    .chip.build-chip {
      background: var(--cream-dark);
      border-color: var(--gold);
      color: var(--navy)
    }

    .feedback {
      padding: 10px 16px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: .9rem;
      margin: 8px 0;
      display: none
    }

    .feedback.show {
      display: block
    }

    .feedback.ok {
      background: rgba(34, 160, 107, .1);
      color: var(--green-dark);
      border: 1px solid rgba(34, 160, 107, .3)
    }

    .feedback.no {
      background: rgba(232, 64, 87, .08);
      color: var(--rose);
      border: 1px solid rgba(232, 64, 87, .2)
    }

    .action-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border)
    }

    .blank-slot {
      display: inline-block;
      min-width: 80px;
      border-bottom: 3px solid var(--cyan);
      text-align: center;
      color: var(--text-muted);
      font-size: .9em;
      padding: 0 4px
    }

    .home-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px
    }

    .topic-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      cursor: pointer;

    function esc(s) {
      return String(s || '').replace(/[&<>"']/g, m => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      } [m]))
    }

    function norm(s) {
      return String(s || '').toLowerCase().replace(/[.,!?。？]/g, '').replace(/\s+/g, ' ').trim()
    }

    function shuf(a) {
      a = a.slice();
      for (let i = a.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]]
      }
      return a
    }

    function zoom(d) {
      z = d === 0 ? 1 : Math.max(.8, Math.min(1.7, +(z + d).toFixed(2)));
      localStorage.cometZoom = z;
      document.documentElement.style.setProperty('--zoom', z)
    }

    function toggleSidebar() {
      collapsed = !collapsed;
      localStorage.cometSidebar = collapsed ? '1' : '0';
      document.getElementById('grid').classList.toggle('collapsed', collapsed)
    }

    function setLangMode(mode) {
      langMode = mode;
      localStorage.cometLang = mode;
      document.body.setAttribute('data-lang', mode);

      // Update active button
      document.querySelectorAll('#lang-switch button').forEach(b => b.classList.remove('active'));
      const activeBtn = document.getElementById('lang-' + mode);
      if (activeBtn) activeBtn.classList.add('active');

      // Re-render current view
      if (state.part !== null) {
        if (state.mode && state.seg !== null) {
          renderQ();
        } else {
          showPart(state.part);
        }
      }
    }

    function qs() {
      return PARTS[state.part][state.mode][state.seg]
    }

    function label() {
      return state.mode === 'checks' ? 'Check ' + (state.seg + 1) : 'Drill ' + (state.seg + 1)
    }

    function renderList() {
      let el = document.getElementById('part-list');
      el.innerHTML = '';
      PARTS.forEach((p, i) => {
        let btn = document.createElement('button');
        btn.className = 'part-btn' + (state.part === i ? ' active' : '');
        btn.innerHTML = `<span class="part-id">${esc(p.id)}</span>${esc(p.title)}<span class="part-jp">${esc(p.jpTitle)}</span>`;
        btn.onclick = () => showPart(i);
        el.appendChild(btn);
      });
    }

    function lessonHTML(p) {
      const exp = p.explanation || {};
      let explanationHTML = '';
      if (exp.intro) {
        explanationHTML += `<div class="explanation-box">`;
        explanationHTML += `<div class="explanation-intro">${esc(exp.intro)}</div>`;
        if (exp.formulas && exp.formulas.length) {
          explanationHTML += `<div class="formula-box">`;
          exp.formulas.forEach(f => {
            explanationHTML += `<div class="formula-row"><span class="formula-pattern">${esc(f.pattern)}</span><span class="formula-meaning">${esc(f.meaning)}</span></div>`;
          });
          explanationHTML += `</div>`;
        }
        if (exp.comparisons && exp.comparisons.length) {
          explanationHTML += `<div class="comparison-box">`;
          exp.comparisons.forEach(c => {
            explanationHTML += `<div class="comp-item">`;
            if (c.en) explanationHTML += `<div class="comp-en">${esc(c.en)}</div>`;
            if (c.meaning) explanationHTML += `<div class="comp-note">${esc(c.meaning)}</div>`;
            explanationHTML += `</div>`;
          });
          explanationHTML += `</div>`;
        }
        explanationHTML += `</div>`;

      const numTitle = p.numberTitle || p.title;
      return `<div class="card lesson-card">

      state.seg = seg;
      state.qi = 0;
      renderQ()
    }

    function progressHTML() {
      let arr = qs();
      let pct = ((state.qi) / arr.length) * 100;
      return `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`
    }

    function renderQ() {
      state.ok = false;
      state.built = [];
      renderList();
      let arr = qs(),
        p = PARTS[state.part];
      if (state.qi >= arr.length) return done();
      let x = arr[state.qi];
      document.getElementById('main').innerHTML = `
    <div class="card">
      <div class="q-counter">${esc(p.id)} · ${label()} · 問題 ${state.qi+1} / ${arr.length}</div>
      ${progressHTML()}
      <div id="qroot"></div>
      <div class="action-bar">
        <button class="btn" onclick="backQ()">← 戻る</button>
        <button class="btn" onclick="showPart(${state.part})">レッスンに戻る</button>
        <button class="btn btn-ghost" onclick="main()">🏠 ホーム</button>
      </div>
    </div>`;
      if (x.type === 'choice') renderChoice(x);
      else renderReorder(x);
    }

    function jpHTML(x) {
      return x.jp ? `<div class="jp-box">🇯🇵 ${esc(x.jp)}</div>` : ''
    }

    function feedback(ok) {
      let f = document.getElementById('fb');
      f.className = 'feedback show ' + (ok ? 'ok' : 'no');
      f.textContent = ok ? '✔ 正解！' : '✘ もう一度やってみよう';
      let retry = document.getElementById('retry'),
        next = document.getElementById('next');
      if (retry) retry.classList.toggle('hidden', ok);
      if (next) next.classList.toggle('hidden', !ok);
      if (ok) state.ok = true;
    }

    function answerBar(extra) {
      return `<div class="action-bar">${extra||''}<button id="retry" class="btn hidden" onclick="retryQ()">↺ やり直す</button><button id="next" class="btn btn-primary hidden" onclick="nextQ()">次へ →</button></div>`
    }

    function renderChoice(x) {
      let r = document.getElementById('qroot');
      r.innerHTML = `${jpHTML(x)}<div class="prompt">${esc(x.prompt)}</div><div id="opts"></div><div id="fb" class="feedback"></div>${answerBar()}`;
      let opts = document.getElementById('opts');
      shuf(x.options).forEach(o => {
        let b = document.createElement('button');
        b.className = 'option-btn';
        b.textContent = o;
        b.onclick = () => {
          if (state.ok) return;
          let ok = norm(o) === norm(x.answer);
          b.classList.toggle('wrong', !ok);
          b.classList.toggle('correct', ok);
          feedback(ok);
          if (!ok) {
            b.disabled = true;
            b.style.opacity = '.5'
          }
        };
        opts.appendChild(b);
      });
    }

    function renderReorder(x) {
      state.chunks = shuf(x.chunks).map((w, i) => ({
        w,
        i,
        used: false
      }));
      document.getElementById('qroot').innerHTML = `${jpHTML(x)}<div class="prompt">${esc(x.before)} <span class="blank-slot">______</span> ${esc(x.after)}</div><div id="build" class="build-area empty"></div><div id="bank" class="bank-area"></div><div id="fb" class="feedback"></div>${answerBar('<button class="btn" onclick="clearBuild()">クリア</button><button class="btn btn-primary" onclick="checkReorder()">答え合わせ</button>')}`;
      drawBuild();
    }

    function drawBuild() {
      let bank = document.getElementById('bank'),
        build = document.getElementById('build');
      if (!bank || !build) return;
      bank.innerHTML = '';
      build.innerHTML = '';
      build.classList.toggle('empty', state.built.length === 0);
      state.chunks.forEach(it => {
        let b = document.createElement('button');
        b.className = 'chip ' + (it.used ? 'used' : '');
        b.textContent = it.w;
        b.disabled = it.used;
        b.onclick = () => {
          it.used = true;
          state.built.push(it);
          drawBuild()
        };
        bank.appendChild(b)
      });
      state.built.forEach((it, pos) => {
        let b = document.createElement('button');
        b.className = 'chip build-chip';
        b.textContent = it.w;
        b.onclick = () => {
          it.used = false;
          state.built.splice(pos, 1);
          drawBuild()
        };
        build.appendChild(b)
      });
    }

    function clearBuild() {
      state.built.forEach(i => i.used = false);
      state.built = [];
      drawBuild()
    }

    function checkReorder() {
      let x = qs()[state.qi];
      feedback(JSON.stringify(state.built.map(i => norm(i.w))) === JSON.stringify(x.answer.map(norm)))
    }

    function retryQ() {
      renderQ()
    }

    function backQ() {
      if (state.qi > 0) {
        state.qi--;
        renderQ()
      } else showPart(state.part)
    }

    function nextQ() {
      if (state.ok) {
        state.qi++;
        renderQ()
      }
    }

    function done() {
      document.getElementById('main').innerHTML = `<div class="card celebration"><div class="icon">🎉</div><h2>${label()} 完了！</h2><p style="color:var(--text-sec);margin-bottom:20px;font-size:.9rem">お疲れ様！このセクションの全問をクリアしました。</p><div class="action-bar"><button class="btn btn-primary" onclick="showPart(${state.part})">レッスンに戻る</button><button class="btn" onclick="state.qi=0;renderQ()">↺ もう一度</button><button class="btn btn-ghost" onclick="main()">🏠 ホーム</button></div></div>`;
    }

    document.getElementById('grid').classList.toggle('collapsed', collapsed);
    document.body.setAttribute('data-lang', langMode);

    // Init active lang button
    setTimeout(() => {
      document.querySelectorAll('#lang-switch button').forEach(b => b.classList.remove('active'));
      const btn = document.getElementById('lang-' + langMode);
      if (btn) btn.classList.add('active');
    }, 60);

    main();
  </script>
