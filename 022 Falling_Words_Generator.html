<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>022 — Falling Words Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      padding: 30px 20px 70px;
    }

    .container { max-width: 820px; margin: 0 auto; }

    header {
      text-align: center;
      margin-bottom: 36px;
      padding-bottom: 22px;
      border-bottom: 1px solid #21262d;
    }

    header .badge {
      display: inline-block;
      background: #003366;
      color: #58a6ff;
      font-size: 0.78em;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    header h1 { font-size: 1.9em; color: #e6edf3; margin-bottom: 6px; }
    header p  { color: #8b949e; font-size: 0.93em; }

    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 12px;
      padding: 22px 26px;
      margin-bottom: 18px;
    }

    .card-title {
      font-size: 0.78em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #f0883e;
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 0.83em;
      color: #8b949e;
      margin-bottom: 5px;
    }

    textarea, input[type="text"], select {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      padding: 10px 13px;
      font-size: 0.95em;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus, input:focus, select:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88,166,255,0.12);
    }

    textarea {
      min-height: 220px;
      resize: vertical;
      font-family: 'Courier New', monospace;
      font-size: 0.9em;
      line-height: 1.7;
    }

    .hint { font-size: 0.77em; color: #8b949e; margin-top: 5px; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 520px) { .grid-2 { grid-template-columns: 1fr; } }

    .field { display: flex; flex-direction: column; gap: 5px; }

    .word-count {
      font-size: 0.8em;
      color: #8b949e;
      margin-top: 7px;
    }
    .word-count strong { color: #58a6ff; }

    .error-msg {
      color: #f85149;
      font-size: 0.82em;
      margin-top: 6px;
      display: none;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .btn {
      padding: 11px 26px;
      border: none;
      border-radius: 8px;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
      letter-spacing: 0.3px;
    }

    .btn-primary { background: #1f6feb; color: #fff; }
    .btn-primary:hover { background: #388bfd; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(56,139,253,0.35); }

    .btn-secondary {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
    }
    .btn-secondary:hover { background: #30363d; }

    .btn-export { background: #238636; color: #fff; font-size: 1.05em; padding: 13px 32px; }
    .btn-export:hover { background: #2ea043; transform: translateY(-2px); box-shadow: 0 5px 18px rgba(46,160,67,0.4); }

    footer {
      text-align: center;
      color: #21262d;
      font-size: 0.77em;
      margin-top: 40px;
    }

    select option { background: #161b22; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">Tool 018</div>
    <h1>🌧 Falling Words Generator</h1>
    <p>Students type the English translation of falling Japanese words before they hit the ground.</p>
  </header>

  <div class="card">
    <div class="card-title">📝 Word Pairs</div>
    <label>One pair per line — Japanese space/tab/| English</label>
    <textarea id="wordInput" placeholder="猫 cat&#10;犬 dog&#10;学校 school&#10;先生 teacher&#10;友達 friend&#10;食べる eat&#10;飲む drink&#10;大きい big&#10;小さい small&#10;楽しい fun&#10;難しい difficult&#10;新しい new"></textarea>
    <div class="word-count" id="wordCount">Words detected: <strong>0</strong></div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="card">
    <div class="card-title">⚙️ Settings</div>
    <div class="grid-2">
      <div class="field">
        <label>Game Title</label>
        <input type="text" id="gameTitle" value="Falling Words">
      </div>
      <div class="field">
        <label>Starting Lives</label>
        <select id="livesSelect">
          <option value="5">5 ❤️</option>
          <option value="3" selected>3 ❤️</option>
          <option value="1">1 ❤️ (Hardcore)</option>
        </select>
      </div>
      <div class="field">
        <label>Fall Speed</label>
        <select id="speedSelect">
          <option value="0.45">🐢 Slow</option>
          <option value="0.85" selected>🚶 Normal</option>
          <option value="1.5">🏃 Fast</option>
          <option value="2.5">⚡ Insane</option>
        </select>
      </div>
      <div class="field">
        <label>Max Words on Screen</label>
        <select id="maxWordsSelect">
          <option value="1">1 — Beginner</option>
          <option value="2" selected>2 — Standard</option>
          <option value="3">3 — Challenging</option>
          <option value="4">4 — Expert</option>
        </select>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-secondary" id="rehydrateBtn">📂 Load from Exported Game</button>
    <button class="btn btn-export" id="exportBtn">⬇ Export Game</button>
  </div>

  <footer>CMarasigan for Kasai-Minami High School · Tool 018</footer>
</div>

<input type="file" id="rehydrateFile" accept=".html" style="display:none">

<script>
var GAME_CONFIG = __CONFIG_JSON__;
</script>

<script>
// ======================================================================
//  STAR BACKGROUND
// ======================================================================
(function() {
  var c  = document.getElementById('starsBg');
  var cx = c.getContext('2d');
  c.width  = window.innerWidth;
  c.height = window.innerHeight;
  cx.fillStyle = '#06081a';
  cx.fillRect(0, 0, c.width, c.height);
  for (var i = 0; i < 280; i++) {
    var x = Math.random() * c.width;
    var y = Math.random() * c.height;
    var r = Math.random() * 1.4 + 0.2;
    var a = 0.2 + Math.random() * 0.8;
    cx.beginPath();
    cx.arc(x, y, r, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(200,220,255,' + a + ')';
    cx.fill();
  }
})();

// ======================================================================
//  GAME ENGINE
// ======================================================================
var CFG = GAME_CONFIG;

var ZOOM_SIZES = [32, 38, 44, 50, 26];
var zoomIdx    = 0;

var state;
var lastTime  = 0;
var gameEnded = false;

function makeState() {
  return {
    words:         shuffle(CFG.words.slice()),
    active:        [],
    wordIdx:       0,
    lives:         CFG.lives,
    score:         0,
    level:         1,
    typed:         0,
    running:       false,
    rafId:         null,
    lastSpawn:     -99999,
    spawnInterval: 2600,
    idCtr:         0
  };
}

// ---- Utilities ----
function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
  return arr;
}

// ---- Zoom ----
document.getElementById('zoomBtn').addEventListener('click', function() {
  zoomIdx = (zoomIdx + 1) % ZOOM_SIZES.length;
  document.documentElement.style.setProperty('--jp-size', ZOOM_SIZES[zoomIdx] + 'px');
});

// ---- Instructions ----
document.getElementById('instrPill').addEventListener('click', function() {
  document.getElementById('instrModal').classList.add('open');
  if (state && state.running) pauseGame();
});
document.getElementById('instrClose').addEventListener('click', function() {
  document.getElementById('instrModal').classList.remove('open');
  if (state && state.running) resumeGame();
});

// ---- goBack ----
function goBack() {
  if (confirm('Leave this game and return to the main menu?')) {
    window.location.href = 'index.html';
  }
}

// ---- Start ----
function startGame() {
  document.getElementById('startOverlay').style.display = 'none';
  document.getElementById('endOverlay').style.display   = 'none';
  gameEnded = false;
  lastTime  = 0;
  state     = makeState();
  state.running = true;
  updateHUD();
  document.getElementById('gameInput').focus();
  state.rafId = requestAnimationFrame(gameLoop);
}

function restartGame() {
  for (var i = 0; i < state.active.length; i++) {
    var w = state.active[i];
    if (w.el && w.el.parentNode) w.el.parentNode.removeChild(w.el);
  }
  document.getElementById('endOverlay').style.display = 'none';
  document.getElementById('gameInput').value = '';
  gameEnded = false;
  lastTime  = 0;
  state     = makeState();
  state.running = true;
  updateHUD();
  document.getElementById('gameInput').focus();
  state.rafId = requestAnimationFrame(gameLoop);
}

function pauseGame() {
  state.running = false;
  if (state.rafId) cancelAnimationFrame(state.rafId);
}

function resumeGame() {
  state.running = true;
  lastTime = 0;
  state.rafId = requestAnimationFrame(gameLoop);
}

// ---- Game loop ----
function gameLoop(ts) {
  if (!state.running) return;
  if (lastTime === 0) lastTime = ts;
  var dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  var ga = document.getElementById('gameArea');
  var areaH = ga.clientHeight;
  var areaW = ga.clientWidth;

  // Move cards
  var alive = [];
  for (var i = 0; i < state.active.length; i++) {
    var w = state.active[i];
    if (w.dying) { alive.push(w); continue; }
    w.y += w.speed * (dt / 16);
    w.el.style.top = w.y + 'px';
    var cardH = w.el.offsetHeight || 72;
    if (w.y + cardH >= areaH) {
      missWord(w);
    }
    alive.push(w);
  }
  state.active = alive;

  // Spawn
  var onScreen = 0;
  for (var j = 0; j < state.active.length; j++) {
    if (!state.active[j].dying) onScreen++;
  }
  if (onScreen < CFG.maxWords
      && ts - state.lastSpawn > state.spawnInterval
      && state.wordIdx < state.words.length) {
    spawnWord(areaW);
    state.lastSpawn = ts;
  }

  // Win: all words used and none falling
  if (state.wordIdx >= state.words.length && onScreen === 0) {
    endGame(true);
    return;
  }

  state.rafId = requestAnimationFrame(gameLoop);
}

function currentSpeed() {
  return CFG.baseSpeed * (1 + (state.level - 1) * 0.2);
}

// ---- Spawn ----
function spawnWord(areaW) {
  var pair = state.words[state.wordIdx++];
  var id   = ++state.idCtr;
  var minX = 20;
  var maxX = Math.max(minX + 10, areaW - 180);
  var x    = minX + Math.random() * (maxX - minX);

  var el = document.createElement('div');
  el.className = 'fw-card';
  el.id = 'fw-' + id;

  var jpDiv = document.createElement('div');
  jpDiv.className = 'fw-jp';
  jpDiv.textContent = pair.jp;

  var pgDiv = document.createElement('div');
  pgDiv.className = 'fw-progress';

  el.appendChild(jpDiv);
  el.appendChild(pgDiv);
  el.style.left = x + 'px';
  el.style.top  = '-90px';

  document.getElementById('gameArea').appendChild(el);

  state.active.push({
    id: id,
    jp: pair.jp,
    en: pair.en,
    x:  x,
    y:  -90,
    speed: currentSpeed(),
    el:   el,
    dying: false
  });
}

// ---- Input ----
var gameInput = document.getElementById('gameInput');
gameInput.addEventListener('input', handleInput);

document.addEventListener('click', function() {
  if (state && state.running) gameInput.focus();
});
gameInput.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') gameInput.value = '';
});

function handleInput() {
  var val = gameInput.value.toLowerCase().trim();

  // Clear all highlights
  for (var i = 0; i < state.active.length; i++) {
    var w = state.active[i];
    if (w.dying) continue;
    w.el.classList.remove('targeted');
    w.el.querySelector('.fw-progress').innerHTML = '';
  }

  if (!val) return;

  // Find matches
  var alive = state.active.filter(function(w) { return !w.dying; });
  var matches = alive.filter(function(w) { return w.en.indexOf(val) === 0; });

  if (matches.length === 0) {
    flashInputError();
    gameInput.value = '';
    return;
  }

  // Target: lowest on screen (most urgent)
  var target = matches.sort(function(a, b) { return b.y - a.y; })[0];

  // Highlight
  target.el.classList.add('targeted');
  var typed     = val;
  var remaining = target.en.slice(val.length);
  var pg = target.el.querySelector('.fw-progress');
  var spTyped = document.createElement('span');
  spTyped.style.color = '#feca57';
  spTyped.textContent = typed;
  var spRem = document.createElement('span');
  spRem.style.color = 'rgba(255,255,255,0.22)';
  spRem.textContent = remaining;
  pg.innerHTML = '';
  pg.appendChild(spTyped);
  pg.appendChild(spRem);

  // Full match
  if (val === target.en) {
    scoreWord(target);
    gameInput.value = '';
  }
}

function flashInputError() {
  gameInput.classList.remove('shake');
  void gameInput.offsetWidth; // reflow
  gameInput.classList.add('shake');
  setTimeout(function() { gameInput.classList.remove('shake'); }, 400);
}

// ---- Score a word ----
function scoreWord(w) {
  w.dying = true;
  w.el.classList.remove('targeted');
  w.el.classList.add('correct');

  var ga = document.getElementById('gameArea');
  var ratio = Math.max(0, 1 - (w.y / ga.clientHeight));
  var bonus  = Math.round(ratio * 6);
  var pts    = 10 + bonus;
  state.score += pts;
  state.typed++;

  floatScore('+' + pts, w.el);

  var wEl = w.el;
  var wId = w.id;
  setTimeout(function() {
    if (wEl.parentNode) wEl.parentNode.removeChild(wEl);
    state.active = state.active.filter(function(a) { return a.id !== wId; });
  }, 380);

  if (state.typed > 0 && state.typed % 5 === 0) levelUp();
  updateHUD();
}

// ---- Miss a word ----
function missWord(w) {
  if (w.dying) return;
  w.dying = true;
  w.el.classList.remove('targeted');
  w.el.classList.add('missed');
  gameInput.value = '';

  state.lives--;
  updateHUD();

  var sf = document.getElementById('screenFlash');
  sf.style.opacity = '1';
  setTimeout(function() { sf.style.opacity = '0'; }, 260);

  var gl = document.getElementById('groundLine');
  gl.style.opacity = '1';
  setTimeout(function() { gl.style.opacity = '0'; }, 260);

  var wEl = w.el;
  var wId = w.id;
  setTimeout(function() {
    if (wEl.parentNode) wEl.parentNode.removeChild(wEl);
    state.active = state.active.filter(function(a) { return a.id !== wId; });
    if (state.lives <= 0 && !gameEnded) endGame(false);
  }, 430);
}

// ---- Level up ----
function levelUp() {
  state.level++;
  state.spawnInterval = Math.max(900, 2600 - (state.level - 1) * 260);

  var t = document.getElementById('lvlToast');
  t.textContent = 'Level ' + state.level + '!  Speed up!';
  t.classList.remove('show');
  void t.offsetWidth;
  t.classList.add('show');
  updateHUD();
}

// ---- HUD ----
function updateHUD() {
  var hearts = '';
  for (var i = 0; i < state.lives; i++) hearts += '❤️';
  for (var j = state.lives; j < CFG.lives; j++) hearts += '🖤';
  document.getElementById('livesDisplay').textContent = hearts;
  document.getElementById('scoreDisplay').textContent = state.score + ' pts';
  document.getElementById('levelDisplay').textContent = 'Level ' + state.level;
}

// ---- Floating score ----
function floatScore(text, refEl) {
  var div = document.createElement('div');
  div.textContent = text;
  div.style.position  = 'absolute';
  div.style.color     = '#00ff99';
  div.style.fontWeight= '800';
  div.style.fontSize  = '1em';
  div.style.pointerEvents = 'none';
  div.style.zIndex    = '20';
  div.style.left      = (refEl.offsetLeft + refEl.offsetWidth / 2) + 'px';
  div.style.top       = (refEl.offsetTop - 8) + 'px';
  div.style.transform = 'translateX(-50%)';
  div.style.animation = 'floatUp 0.9s ease-out forwards';
  document.getElementById('gameArea').appendChild(div);
  setTimeout(function() { if (div.parentNode) div.parentNode.removeChild(div); }, 900);
}

var _fs = document.createElement('style');
_fs.textContent = '@keyframes floatUp{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-52px)}}';
document.head.appendChild(_fs);

// ---- End game ----
function endGame(won) {
  if (gameEnded) return;
  gameEnded = true;
  state.running = false;
  if (state.rafId) cancelAnimationFrame(state.rafId);

  document.getElementById('endTitle').textContent = won ? '🎉 Complete!' : '💀 Game Over';
  document.getElementById('endSub').textContent   = won
    ? 'You typed every word!'
    : 'A word slipped through...';
  document.getElementById('endScore').textContent = state.score + ' pts';
  document.getElementById('endStats').textContent =
    'Words: ' + state.typed + ' / ' + CFG.words.length + '  ·  Level reached: ' + state.level;

  document.getElementById('endOverlay').style.display = 'flex';
  gameInput.blur();
}

// ---- Focus guard ----
gameInput.addEventListener('blur', function() {
  if (state && state.running) {
    setTimeout(function() {
      if (state && state.running) gameInput.focus();
    }, 100);
  }
});

updateHUD();
</script>

</body>

<script>
  // =====================================================================
  //  GENERATOR LOGIC
  // =====================================================================

  var wordInput   = document.getElementById('wordInput');
  var wordCountEl = document.getElementById('wordCount');
  var errorMsg    = document.getElementById('errorMsg');

  wordInput.addEventListener('input', refreshCount);
  refreshCount();

  function refreshCount() {
    var n = parseWordPairs(wordInput.value).length;
    wordCountEl.innerHTML = 'Words detected: <strong>' + n + '</strong>';
  }

  function parseWordPairs(text) {
    var lines = text.trim().split('\n');
    var pairs = [];
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) continue;
      var jp, en;
      if (line.indexOf('|') > -1) {
        var parts = line.split('|');
        jp = parts[0].trim();
        en = parts[1] ? parts[1].trim() : '';
      } else if (line.indexOf('\t') > -1) {
        var parts2 = line.split('\t');
        jp = parts2[0].trim();
        en = parts2[1] ? parts2[1].trim() : '';
      } else {
        // Split on first whitespace (including ideographic space U+3000)
        var idx = line.search(/[\s\u3000]/);
        if (idx > 0) {
          jp = line.slice(0, idx).trim();
          en = line.slice(idx).trim();
        } else {
          continue;
        }
      }
      if (jp && en) pairs.push({ jp: jp, en: en.toLowerCase() });
    }
    return pairs;
  }

  // ---- Rehydrate ----
  document.getElementById('rehydrateBtn').addEventListener('click', function() {
    document.getElementById('rehydrateFile').click();
  });

  document.getElementById('rehydrateFile').addEventListener('change', function() {
    var file = this.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      var html = e.target.result;
      try {
        var match = html.match(/var GAME_CONFIG\s*=\s*(\{[\s\S]*?\});/);
        if (!match) throw new Error('No config');
        var cfg = JSON.parse(match[1]);
        document.getElementById('gameTitle').value   = cfg.title    || 'Falling Words';
        document.getElementById('livesSelect').value = cfg.lives    || 3;
        document.getElementById('speedSelect').value = cfg.baseSpeed|| 0.85;
        document.getElementById('maxWordsSelect').value = cfg.maxWords || 2;
        var pairText = cfg.words.map(function(w) { return w.jp + ' ' + w.en; }).join('\n');
        wordInput.value = pairText;
        refreshCount();
      } catch(err) {
        alert('Could not read game config from that file.');
      }
    };
    reader.readAsText(file);
    this.value = '';
  });

  // ---- Export ----
  document.getElementById('exportBtn').addEventListener('click', function() {
    var pairs = parseWordPairs(wordInput.value);
    if (pairs.length < 3) {
      errorMsg.textContent = 'Please enter at least 3 word pairs.';
      errorMsg.style.display = 'block';
      return;
    }
    errorMsg.style.display = 'none';

    var cfg = {
      title:     document.getElementById('gameTitle').value.trim() || 'Falling Words',
      words:     pairs,
      lives:     parseInt(document.getElementById('livesSelect').value),
      baseSpeed: parseFloat(document.getElementById('speedSelect').value),
      maxWords:  parseInt(document.getElementById('maxWordsSelect').value)
    };

    var html = buildGameHTML(cfg);
    var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    var a    = document.createElement('a');
    a.href   = URL.createObjectURL(blob);
    a.download = cfg.title.replace(/\s+/g, '_') + '.html';
    a.click();
    URL.revokeObjectURL(a.href);
  });

  function buildGameHTML(cfg) {
    var template = document.getElementById('gameTpl').value;
    var cfgJSON  = JSON.stringify(cfg, null, 2);

    template = template.split('__CONFIG_JSON__').join(cfgJSON);
    template = template.split('__TITLE__').join(escapeHTML(cfg.title));
    template = template.split('__LIVES__').join(cfg.lives);
    template = template.split('__WORD_COUNT__').join(cfg.words.length);
    return template;
  }

  function escapeHTML(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
