<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let's Write! Learn English — From Sentence to Paragraph | Interactive Drillbook</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#2c3e50;--accent:#e74c3c;--accent2:#3498db;--bg:#f5f6fa;--sidebar:#ecf0f1;--correct:#27ae60;--wrong:#c0392b;--tab-bg:#dfe6e9;--tab-active:#fff}
body{font-family:'Segoe UI','Hiragino Sans','Yu Gothic','Meiryo',sans-serif;background:var(--bg);color:var(--primary);display:flex;height:100vh;overflow:hidden}
/* Sidebar */
#sidebar{width:300px;background:var(--sidebar);border-right:2px solid #bdc3c7;display:flex;flex-direction:column;flex-shrink:0}
#sidebar-header{padding:15px;background:var(--primary);color:#fff}
#sidebar-header h1{font-size:14px;margin-bottom:4px}
#sidebar-header p{font-size:11px;opacity:.8}
#search{width:100%;padding:10px;border:1px solid #bdc3c7;border-radius:4px;font-size:14px;margin:10px}
#unit-list{flex:1;overflow-y:auto;padding:0 10px 10px}
.unit-item{padding:10px;margin:5px 0;background:#fff;border-radius:6px;cursor:pointer;border-left:4px solid var(--accent2);transition:.2s}
.unit-item:hover,.unit-item.active{background:#e8f4fd;border-left-color:var(--accent)}
.unit-item .num{display:inline-block;background:var(--primary);color:#fff;border-radius:50%;width:26px;height:26px;text-align:center;line-height:26px;font-size:12px;font-weight:bold;margin-right:8px}
.unit-item .title{font-weight:bold;font-size:13px}
.unit-item .subtitle{font-size:11px;color:#666;margin-top:3px}
.unit-item .grammar{font-size:10px;color:var(--accent);margin-top:2px;font-weight:bold}
/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#unit-header{padding:15px 20px;background:#fff;border-bottom:2px solid #bdc3c7}
#unit-header h2{font-size:22px}
#unit-header .grammar-label{display:inline-block;background:var(--accent);color:#fff;padding:3px 10px;border-radius:12px;font-size:12px;margin-left:10px}
#tabs{display:flex;background:var(--tab-bg);padding:0 10px;overflow-x:auto;border-bottom:2px solid #bdc3c7;flex-wrap:nowrap}
.tab{padding:10px 14px;cursor:pointer;font-size:13px;white-space:nowrap;border-right:1px solid #bdc3c7;background:var(--tab-bg);border-bottom:3px solid transparent;transition:.2s}
.tab:hover{background:#fff}
.tab.active{background:var(--tab-active);border-bottom:3px solid var(--accent);font-weight:bold}
#content{flex:1;overflow-y:auto;padding:25px 30px;background:#fff}
/* Content styling */
h3.section-title{font-size:20px;margin:20px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--accent);color:var(--primary)}
h4{font-size:16px;margin:15px 0 8px;color:var(--accent2)}
p{line-height:1.7;margin:8px 0}
.jp{color:#555;font-size:13px;line-height:1.6}
.italic-jp{font-style:italic;color:#7f8c8d;font-size:13px;margin-left:20px;display:block;margin-top:2px;margin-bottom:6px}
/* Vocabulary */
.vocab-list{list-style:none;columns:2;column-gap:20px;margin:10px 0}
.vocab-list li{padding:4px 0;font-size:14px;break-inside:avoid}
.vocab-list .num{display:inline-block;width:26px;font-weight:bold;color:var(--accent2)}
.vocab-options{margin:10px 0 10px 30px;columns:2;font-size:13px;color:#555}
.vocab-options span{display:block;padding:2px 0}
.show-answer-btn{background:var(--accent2);color:#fff;border:none;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px;margin-left:8px}
.show-answer-btn:hover{background:#2980b9}
.answer{display:none;background:#d5f5e3;padding:8px 12px;border-left:4px solid var(--correct);margin:8px 0;border-radius:4px}
.answer.show{display:block}
/* Grammar */
.grammar-table{border-collapse:collapse;margin:10px 0;font-size:13px}
.grammar-table th,.grammar-table td{border:1px solid #95a5a6;padding:6px 12px;text-align:center}
.grammar-table th{background:#ecf0f1}
.grammar-table td.blank{background:#fff9e6;min-width:60px;cursor:pointer}
.grammar-table td.blank:hover{background:#fef3c7}
.grammar-table td.blank.revealed{background:#d5f5e3;color:var(--correct);font-weight:bold}
.example-sentence{margin:12px 0;padding:10px;background:#f8f9fa;border-left:3px solid var(--accent2);border-radius:0 4px 4px 0}
.example-sentence .en{font-size:15px}
.example-sentence .jp{color:#666;font-size:13px;margin-top:3px}
/* Conversation */
.conversation{background:#fef9e7;border-radius:8px;padding:15px;margin:12px 0;border:1px solid #f9e79f}
.conv-line{margin:8px 0}
.speaker{font-weight:bold;color:var(--accent);margin-right:5px}
/* Exercises */
.exercise{margin:15px 0;padding:15px;background:#f8f9fa;border-radius:6px;border-left:4px solid var(--accent)}
.ex-item{margin:12px 0;padding:10px;background:#fff;border-radius:4px}
.ex-blank{display:inline-block;min-width:100px;border-bottom:2px solid var(--primary);padding:0 4px;font-weight:bold;color:var(--correct);background:#d5f5e3}
.ex-label{font-weight:bold;color:var(--accent2);margin-right:6px}
.fill-blank{display:inline-block;border-bottom:1px dashed #999;min-width:80px;cursor:pointer;padding:0 4px}
.fill-blank.revealed{color:var(--correct);border-bottom:2px solid var(--correct);font-weight:bold}
.word-bank{font-size:12px;color:#666;font-style:italic;margin-top:4px}
/* Reading */
.reading-passage{background:#eaf2f8;padding:20px;border-radius:8px;margin:15px 0;line-height:1.8;font-size:15px;border-left:4px solid var(--accent2)}
.reading-title{font-weight:bold;text-align:center;font-size:17px;margin-bottom:10px}
.comprehension-q{margin:12px 0;padding:12px;background:#fff;border-radius:6px;border-left:3px solid var(--accent)}
.comprehension-q .q-text{font-weight:bold;margin-bottom:8px}
.options{list-style:none;margin-left:10px}
.options li{padding:6px 10px;margin:4px 0;border-radius:4px;cursor:pointer;border:1px solid #ddd;transition:.1s}
.options li:hover{background:#f0f0f0}
.options li.correct{background:#d5f5e3;border-color:var(--correct);color:var(--correct);font-weight:bold}
.options li.wrong{background:#fadbd8;border-color:var(--wrong);color:var(--wrong)}
.explanation{display:none;margin-top:8px;padding:8px;background:#eaf2f8;border-radius:4px;font-size:13px}
.explanation.show{display:block}
/* Point/Notes */
.point-box{background:#fef9e7;padding:15px;border-radius:8px;margin:15px 0;border:2px solid #f9e79f}
.point-table{border-collapse:collapse;width:100%;margin:10px 0;font-size:13px}
.point-table th,.point-table td{border:1px solid #95a5a6;padding:8px}
.point-table th{background:#f9e79f;width:140px}
/* Writing section */
.useful-expr{background:#eafaf1;padding:15px;border-radius:8px;margin:15px 0}
.useful-expr h4{color:var(--correct)}
.useful-expr ul{list-style:none;margin-left:10px}
.useful-expr li{margin:8px 0;line-height:1.6;font-size:14px}
.writing-hints{background:#fff9e6;padding:12px;border-radius:6px;margin:10px 0;font-size:13px;color:#555}
.writing-area{border:2px solid #bdc3c7;padding:15px;border-radius:8px;margin:15px 0;min-height:300px;background:#fafafa}
.writing-lines{height:30px;border-bottom:1px solid #ddd}
/* Quick Response */
.stopwatch{text-align:center;padding:20px;background:#2c3e50;color:#fff;border-radius:8px;margin:15px 0}
.timer-display{font-size:48px;font-family:'Courier New',monospace;font-weight:bold;margin:10px 0}
.stopwatch button{padding:10px 20px;margin:5px;border:none;border-radius:4px;cursor:pointer;font-size:14px;font-weight:bold}
.btn-start{background:var(--correct);color:#fff}
.btn-stop{background:var(--wrong);color:#fff}
.btn-reset{background:#7f8c8d;color:#fff}
.qr-list{margin:15px 0}
.qr-item{padding:10px;margin:6px 0;background:#f8f9fa;border-radius:4px;cursor:pointer;border-left:3px solid var(--accent2)}
.qr-item:hover{background:#e8f4fd}
.qr-answer{display:none;margin-top:6px;color:var(--correct);font-weight:bold}
.qr-answer.show{display:block}
/* Games */
.game-container{background:#fdf2e9;padding:20px;border-radius:8px;margin:15px 0}
/* Sentence Builder */
.sentence-jp{font-size:17px;margin:10px 0;padding:10px;background:#fff;border-radius:4px}
.word-chips{display:flex;flex-wrap:wrap;gap:8px;margin:15px 0}
.word-chip{background:#fff;border:2px solid var(--accent2);padding:8px 16px;border-radius:20px;cursor:grab;font-size:14px;transition:.2s;user-select:none}
.word-chip:hover{background:#e8f4fd}
.word-chip.used{opacity:.3;pointer-events:none}
.builder-answer{margin-top:15px;min-height:50px;padding:12px;border:2px dashed #95a5a6;border-radius:6px;background:#fff;min-height:60px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.builder-answer .word-chip{cursor:pointer;border-color:var(--accent)}
.reveal-btn{background:var(--accent);color:#fff;border:none;padding:8px 18px;border-radius:4px;cursor:pointer;font-size:14px;margin:10px 5px}
.model-answer{display:none;background:#d5f5e3;padding:12px;border-left:4px solid var(--correct);margin:10px 0;border-radius:4px;font-weight:bold}
.model-answer.show{display:block}
/* Quiz Tournament */
.quiz-arena{background:#2c3e50;color:#fff;padding:25px;border-radius:8px;margin:15px 0;text-align:center}
.quiz-stats{display:flex;justify-content:space-around;margin:10px 0;font-size:14px}
.quiz-q{font-size:18px;margin:15px 0;min-height:60px}
.quiz-timer{width:100%;height:10px;background:#555;border-radius:5px;overflow:hidden;margin:10px 0}
.quiz-timer-bar{height:100%;background:var(--accent);transition:width .1s linear}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0}
.quiz-opt{background:#34495e;color:#fff;border:2px solid #7f8c8d;padding:12px;border-radius:6px;cursor:pointer;font-size:14px;transition:.2s}
.quiz-opt:hover{background:#3d566e}
.quiz-opt.correct{background:var(--correct);border-color:var(--correct)}
.quiz-opt.wrong{background:var(--wrong);border-color:var(--wrong)}
.quiz-start,.quiz-next{background:var(--accent);color:#fff;border:none;padding:12px 30px;border-radius:6px;cursor:pointer;font-size:16px;font-weight:bold}
.quiz-result{font-size:20px;margin:15px 0}
/* Translation Challenge */
.translation-item{background:#fff;padding:15px;border-radius:6px;margin:10px 0;border-left:4px solid var(--accent)}
.translation-jp{font-size:16px;margin-bottom:10px}
/* Generic */
.hint-box{background:#fdf2e9;padding:10px;border-radius:4px;margin:10px 0;font-size:12px;color:#666;border-left:3px solid #e67e22}
.note-tag{background:#34495e;color:#fff;padding:2px 8px;border-radius:3px;font-size:11px;margin-right:6px}
.instr{font-size:13px;color:#555;margin:8px 0;font-style:italic}
ul.clean,ol.clean{margin-left:25px;line-height:1.8}
ul.clean li,ol.clean li{margin:4px 0}
.jp-note{color:#555;font-size:12px;line-height:1.7}
.cd-badge{display:inline-block;background:#2c3e50;color:#fff;font-size:10px;padding:2px 6px;border-radius:3px;margin-left:6px;vertical-align:middle}

/* In-place reveal rebuild */
.fill-blank,.inline-reveal,.step1-line,.sentence-reveal,.translation-pill{display:inline-block;min-width:110px;border-bottom:2px dashed #95a5a6;padding:2px 8px;margin:0 2px;cursor:pointer;border-radius:4px 4px 0 0;color:#7f8c8d;background:#fff;transition:.15s ease;}
.fill-blank:hover,.inline-reveal:hover,.step1-line:hover,.sentence-reveal:hover,.translation-pill:hover{background:#fff9e6;color:var(--primary)}
.fill-blank.revealed,.inline-reveal.revealed,.step1-line.revealed,.sentence-reveal.revealed,.translation-pill.revealed{border-bottom:2px solid var(--correct);background:#d5f5e3;color:var(--correct);font-weight:bold;}
.step1-line{min-width:280px;white-space:normal;line-height:1.7}.sentence-reveal{display:block;min-width:260px;margin-top:8px;padding:8px 10px}.writing-textarea{width:100%;min-height:300px;resize:vertical;border:2px solid #bdc3c7;border-radius:8px;padding:16px;font-size:15px;line-height:1.8;font-family:inherit;background:#fff}.writing-textarea.model-shown{border-color:var(--correct);background:#f4fff8}.translation-pill{display:block;margin-top:10px;min-height:36px;line-height:1.6}.builder-answer.revealed-model{border-color:var(--correct);background:#d5f5e3;color:var(--correct);font-weight:bold;display:block;line-height:1.7}
/* Professional LMS / Classroom Presentation Redesign Layer */
:root{--primary:#203247;--accent:#3b82f6;--accent2:#2563eb;--bg:#eef4fb;--sidebar:#f8fafc;--correct:#15803d;--wrong:#b91c1c;--tab-bg:#edf2f7;--tab-active:#ffffff;--line:#d7e1ea;--shadow:0 10px 28px rgba(15,23,42,.08);--radius:18px;}
body{background:linear-gradient(135deg,#eaf4ff 0%,#f8fafc 42%,#eefdf7 100%);color:#203247;letter-spacing:.01em;}
#sidebar{width:320px;background:rgba(248,250,252,.96);border-right:1px solid var(--line);box-shadow:6px 0 22px rgba(15,23,42,.06)}
#sidebar-header{background:linear-gradient(135deg,#1e3a5f,#2563eb);padding:22px 20px;border-bottom-right-radius:24px}#sidebar-header h1{font-size:20px;margin-bottom:6px}#sidebar-header p{font-size:12px;line-height:1.55;opacity:.92}
#search{width:calc(100% - 28px);margin:14px;border:1px solid #cbd5e1;border-radius:999px;padding:12px 16px;background:#fff;box-shadow:0 4px 12px rgba(15,23,42,.04)}#unit-list{padding:0 14px 18px}
.unit-item{position:relative;padding:14px 14px 14px 16px;margin:10px 0;border-radius:16px;border:1px solid #e2e8f0;border-left:0;background:#fff;box-shadow:0 4px 14px rgba(15,23,42,.045)}.unit-item:before{content:'';position:absolute;left:0;top:14px;bottom:14px;width:5px;border-radius:0 8px 8px 0;background:#93c5fd}.unit-item:hover{transform:translateY(-1px);background:#f8fbff;box-shadow:0 8px 20px rgba(15,23,42,.08)}.unit-item.active{background:#eaf4ff;border-color:#bfdbfe;box-shadow:0 10px 24px rgba(37,99,235,.15)}.unit-item.active:before{background:#2563eb}.unit-item .num{background:#2563eb;width:30px;height:30px;line-height:30px;font-size:12px;margin-right:10px;box-shadow:0 4px 10px rgba(37,99,235,.22)}.unit-item .title{font-size:14px;color:#1e293b}.unit-item .subtitle{font-size:12px;color:#64748b;margin-top:7px}.unit-item .grammar{font-size:11px;color:#2563eb;margin-top:6px;background:#dbeafe;display:inline-block;padding:3px 8px;border-radius:999px}
#main{background:transparent}#unit-header{padding:24px 30px 26px;background:rgba(255,255,255,.90);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);box-shadow:0 4px 18px rgba(15,23,42,.04)}#unit-header h2{font-size:28px;line-height:1.25;display:flex;align-items:center;gap:12px;flex-wrap:wrap}#unit-header .jp{font-size:14px;color:#64748b;margin-top:8px}.grammar-label{background:#e0f2fe!important;color:#075985!important;border:1px solid #bae6fd;padding:6px 12px!important;border-radius:999px!important;font-size:12px!important;font-weight:700}
#tabs{gap:8px;background:rgba(248,250,252,.92);border-bottom:1px solid var(--line);padding:10px 18px}.tab{border:1px solid transparent;border-right:0;border-radius:999px;padding:10px 14px;font-size:13px;color:#334155;background:transparent}.tab:hover{background:#fff;border-color:#dbeafe;color:#1d4ed8}.tab.active{background:#fff;border:1px solid #bfdbfe;color:#1d4ed8;box-shadow:0 4px 12px rgba(37,99,235,.12)}
#content{padding:34px 38px 60px;background:transparent;scroll-behavior:smooth}#content > h3.section-title,#content > h4,#content > p,#content > div,#content > table,#content > ul,#content > ol{max-width:1120px;margin-left:auto;margin-right:auto}h3.section-title{font-size:22px;margin:8px auto 18px!important;border:0;color:#1e3a5f;background:#fff;padding:18px 22px;border-radius:var(--radius);box-shadow:var(--shadow)}h4{color:#1d4ed8;font-size:17px;margin-top:22px!important}.example-sentence,.exercise,.ex-item,.conversation,.point-box,.useful-expr,.writing-hints,.writing-area,.game-container,.translation-item,.comprehension-q,.reading-passage{border-radius:18px!important;box-shadow:0 7px 20px rgba(15,23,42,.055);border:1px solid #e2e8f0!important}.ex-item{padding:18px 20px;margin:14px auto;background:#fff;border-left:5px solid #93c5fd!important;line-height:1.8}.ex-item .speaker{color:#2563eb}.fill-blank,.inline-reveal,.step1-line,.sentence-reveal,.translation-pill{border-bottom:2px dashed #94a3b8;color:#64748b;background:#f8fafc;border-radius:10px 10px 4px 4px;min-height:30px}.fill-blank:hover,.inline-reveal:hover,.step1-line:hover,.sentence-reveal:hover,.translation-pill:hover{background:#fff7ed;color:#0f172a}.fill-blank.revealed,.inline-reveal.revealed,.step1-line.revealed,.sentence-reveal.revealed,.translation-pill.revealed{background:#ecfdf5;color:#15803d;border-bottom-color:#15803d}.sentence-reveal,.translation-pill{margin-top:12px;padding:10px 12px;border:1px dashed #cbd5e1}.word-bank,.hint-box{background:#fff7ed!important;color:#7c2d12!important;border-left:4px solid #fb923c!important;border-radius:14px!important}.show-answer-btn,.reveal-btn,.quiz-start,.quiz-next{border-radius:999px!important;box-shadow:0 4px 12px rgba(37,99,235,.15)}.reading-passage{background:#f8fbff;border-left:6px solid #60a5fa!important;font-size:16px}.reading-title{color:#1e3a5f;font-size:19px;margin-bottom:14px}.options li{border-radius:14px;padding:10px 12px;background:#fff}.options li.correct{background:#ecfdf5!important;color:#15803d!important}.options li.wrong{background:#fef2f2!important;color:#b91c1c!important}.useful-expr{background:#fff!important;border-left:6px solid #34d399!important}.writing-hints{background:#fff7ed;color:#7c2d12}.writing-area{background:#fff;padding:20px}.writing-textarea{min-height:340px;background:linear-gradient(#fff,#fff) padding-box,repeating-linear-gradient(to bottom,transparent 0,transparent 31px,rgba(148,163,184,.28) 32px) border-box}.game-container{background:#fff7ed!important;border-left:6px solid #fb923c!important}.word-chip{border-color:#60a5fa;border-radius:999px;background:#fff}.builder-answer{background:#fff;border-radius:16px}.quiz-arena{border-radius:22px;background:linear-gradient(135deg,#1e3a5f,#0f172a)}.translation-item{background:#fff;border-left:5px solid #a78bfa!important}.answer{border-radius:14px;background:#ecfdf5;color:#166534;border-left-color:#22c55e}@media(max-width:900px){body{display:block;overflow:auto;height:auto}#sidebar{width:100%;max-height:none;border-right:0}#main{min-height:100vh}#content{padding:22px 16px 40px}#unit-header{padding:22px 18px}#unit-header h2{font-size:22px}}

@media(max-width:768px){#sidebar{width:250px}.vocab-list{columns:1}}

/* Quick Response sequential */
.qr-arena{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:22px;box-shadow:0 7px 20px rgba(15,23,42,.055);margin:16px auto;max-width:1120px}
.qr-progress{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px;font-size:14px;color:#334155}
.qr-progress b{color:#0f172a}
.qr-current-card{background:linear-gradient(180deg,#f8fbff,#fff);border:2px solid #93c5fd;border-radius:16px;padding:22px;min-height:120px;text-align:center}
.qr-current-jp{font-size:22px;line-height:1.6;color:#0f172a;font-weight:700;margin:8px 0 14px}
.qr-current-en{font-size:18px;color:#15803d;font-weight:700;min-height:28px;margin-top:10px}
.qr-timer-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.qr-timer-box{background:#0f172a;color:#fff;border-radius:14px;padding:14px;text-align:center}
.qr-timer-box .label{font-size:12px;opacity:.8}
.qr-timer-box .val{font-size:28px;font-weight:800;letter-spacing:.5px;margin-top:4px}
.qr-controls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.qr-controls button{border:none;border-radius:999px;padding:12px 20px;font-weight:700;cursor:pointer;font-size:14px}
.qr-btn-start{background:#2563eb;color:#fff}
.qr-btn-next{background:#16a34a;color:#fff}
.qr-btn-skip{background:#64748b;color:#fff}
.qr-btn-reset{background:#e2e8f0;color:#0f172a}
.qr-btn-start:disabled,.qr-btn-next:disabled{opacity:.5;cursor:not-allowed}
.qr-summary{margin-top:18px;background:#f8fafc;border-radius:14px;padding:14px}
.qr-summary table{width:100%;border-collapse:collapse;font-size:14px}
.qr-summary th,.qr-summary td{padding:8px;border-bottom:1px solid #e2e8f0;text-align:left}
.qr-summary tr.total{font-weight:800;background:#ecfdf5}
.qr-item.done{opacity:.7}
.qr-item.active-qr{border-left:4px solid #2563eb;background:#eff6ff}
/* Reading evidence highlight */
.reading-passage-text{line-height:1.9}
mark.evidence-hl{background:#fef08a;color:#854d0e;font-weight:700;text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:3px;padding:0 2px;border-radius:3px;box-shadow:inset 0 -2px 0 rgba(234,179,8,.45)}
.comprehension-q.answered .explanation{display:block}

</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Let's Write!</h1>

// Escaping helper
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function attr(s){return esc(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function getGrammarLabel(u){if(!u)return '';if(typeof u.grammar==='string')return u.grammar;if(u.grammar&&typeof u.grammar.title==='string')return u.grammar.title;return '';}
function revealInline(el){if(!el.dataset.original){el.dataset.original=el.getAttribute('data-original')||el.textContent;}const answer=el.dataset.answer||'';if(el.classList.contains('revealed')){el.textContent=el.dataset.original;el.classList.remove('revealed');}else{el.textContent=answer;el.classList.add('revealed');}}
function writeFirstBlankAsReveal(text, answer){const safeText=esc(text||'');const safeAns=attr(answer||'');const leadBlankRe=/^\s*(?:_{3,}\s*)+/;const blankRe=/_{3,}/;if(leadBlankRe.test(safeText)){return safeText.replace(leadBlankRe,`<span class="fill-blank" data-answer="${safeAns}" onclick="revealInline(this)">__________</span> `);}if(/_{3,}/.test(safeText)){return safeText.replace(/_{3,}/,`<span class="fill-blank" data-answer="${safeAns}" onclick="revealInline(this)">__________</span>`);}return `${safeText} <span class="fill-blank" data-answer="${safeAns}" onclick="revealInline(this)">__________</span>`;}
function fillModelText(btn,id){const area=document.getElementById(id);if(!area)return;if(area.classList.contains('model-shown')){area.value=area.dataset.userDraft||'';area.classList.remove('model-shown');btn.textContent='Show Model in Text Box';}else{area.dataset.userDraft=area.value;area.value=area.dataset.model||'';area.classList.add('model-shown');btn.textContent='Return to My Draft';}}

function formatBlankItem(text, answer){
  const safeAns=attr(answer||'');
  const raw=String(text||'');
  // Prefer explicit underscores
  if(/_{3,}/.test(raw)){
    return esc(raw).replace(/_{3,}/, `<span class="fill-blank" data-answer="${safeAns}" onclick="revealInline(this)">__________</span>`);
  }
  // Choice parentheses: ( Are / Will ) or (I'll / I'm going to)
  const choiceRe=/\(([^)]*\/[^)]*)\)/;
  if(choiceRe.test(raw)){
    return esc(raw).replace(choiceRe, `<span class="fill-blank" data-answer="${safeAns}" onclick="revealInline(this)">__________</span>`);
  }
  // blank + after already split by caller
  return null;
}

function fmtTime(ms){
  ms=Math.max(0, ms|0);
  const s=Math.floor(ms/1000), cs=Math.floor((ms%1000)/100);

}
function fmtSec(ms){ return (Math.max(0,ms)/1000).toFixed(1); }

function qrClearTimer(){ if(qrState.timer){ clearInterval(qrState.timer); qrState.timer=null; } }
function qrTick(){
  if(!qrState.running) return;
  qrState.curMs = Date.now() - qrState.t0;
  const liveTotal = qrState.totalMs + qrState.curMs;
  const cd=document.getElementById('qr-cur-display');
  const td=document.getElementById('qr-total-display');
  const cl=document.getElementById('qr-cur-label');
  const tl=document.getElementById('qr-total-label');
  if(cd) cd.textContent=fmtTime(qrState.curMs);
  if(td) td.textContent=fmtTime(liveTotal);
  if(cl) cl.textContent=fmtSec(qrState.curMs)+'s';
  if(tl) tl.textContent=fmtSec(liveTotal)+'s';
}
function qrRenderPreview(){
  const box=document.getElementById('qr-list-preview');
  if(!box) return;
  box.innerHTML = qrState.items.map((it,i)=>{
    const t=qrState.times[i];

function clearPassageHighlights(){
  const el=document.getElementById('reading-passage-text');
  if(!el) return;
  // unwrap marks
  el.querySelectorAll('mark.evidence-hl').forEach(m=>{
    const t=document.createTextNode(m.textContent);
    m.parentNode.replaceChild(t, m);
  });
  el.normalize();
}

function extractEvidenceCandidates(q, correctOpt){
  const cands=[];
  if(q.evidence){
    if(Array.isArray(q.evidence)) cands.push(...q.evidence);
    else cands.push(String(q.evidence));
  }
  // quoted spans in explain: 「...」 or "..."
  const explain=q.explain||'';
  const jpQuotes=[...explain.matchAll(/「([^」]{4,})」/g)].map(m=>m[1]);
  const enQuotes=[...explain.matchAll(/"([^"]{4,})"/g)].map(m=>m[1]);
  cands.push(...jpQuotes, ...enQuotes);
  // correct option text without (A)/(B)/(C)
  if(correctOpt&&correctOpt.text){
    const t=String(correctOpt.text).replace(/^\([A-C]\)\s*/,'').trim();
    if(t.length>=4) cands.push(t);
    // significant words length>3
    const words=t.split(/[^A-Za-z']+/).filter(w=>w.length>=5);
    if(words.length) cands.push(words.slice(0,3).join(' '));
  }
  // unique non-empty
  return [...new Set(cands.map(s=>String(s||'').trim()).filter(s=>s.length>=3))];
}

function highlightInPassage(phrase){
  const el=document.getElementById('reading-passage-text');
  if(!el||!phrase) return false;
  const plain=el.textContent||'';
  // case-insensitive search for English; exact for others
  const lower=plain.toLowerCase();
  const target=phrase.toLowerCase();
  let idx=lower.indexOf(target);
  let matchLen=phrase.length;
  if(idx<0){
    // try without trailing punctuation differences
    const soft=target.replace(/[.,!?;:]+$/,'');
    idx=lower.indexOf(soft);
    matchLen=soft.length;
  }
  if(idx<0) return false;
  // rebuild HTML with highlight at idx
  // Work on text nodes only after clear
  const full=plain;
  const before=full.slice(0, idx);
  const mid=full.slice(idx, idx+matchLen);
  const after=full.slice(idx+matchLen);
  el.innerHTML = esc(before) + `<mark class="evidence-hl">${esc(mid)}</mark>` + esc(after).replace(/\n/g,'<br>');
  // scroll into view
  const mark=el.querySelector('mark.evidence-hl');
  if(mark) mark.scrollIntoView({behavior:'smooth', block:'center'});
  return true;
}

function highlightEvidenceForQuestion(qi){
  clearPassageHighlights();
  const r=UNITS[currentUnit].reading||{};
  const q=(r.questions||[])[qi];
  if(!q) return;
  const opts=q.options||q.opts||[];
  const correct=opts.find(o=>o.correct)||null;
  const cands=extractEvidenceCandidates(q, correct);
  // prefer longer candidates that exist in passage
  const passage=(r.passage||'');
  const ranked=cands
    .map(c=>({c, ok: passage.toLowerCase().includes(String(c).toLowerCase()) || passage.includes(c)}))
    .filter(x=>x.ok)
    .sort((a,b)=>b.c.length-a.c.length);
  for(const x of ranked){
    if(highlightInPassage(x.c)) return true;
  }
  // fallback: first sentence containing any strong keyword from correct answer
  if(correct&&correct.text){
    const keywords=String(correct.text).replace(/^\([A-C]\)\s*/,'').split(/[^A-Za-z']+/).filter(w=>w.length>=5);
    const sentences=passage.split(/(?<=[.!?])\s+/);
    for(const s of sentences){
      const sl=s.toLowerCase();
      if(keywords.some(k=>sl.includes(k.toLowerCase()))){
        if(highlightInPassage(s.trim())) return true;
      }
    }
  }
  return false;
}

function answerReading(li,qi,oi,correct){
  const qbox=li.closest('.comprehension-q')||li.parentElement.parentElement;
  const list=qbox.querySelector('.options')||li.parentElement;

  const opts=qdata.options||qdata.opts||[];
  if(correct===true || correct==='true'){
    li.classList.add('correct');

  }else{
    li.classList.add('wrong');

    // still show evidence for the correct answer
    highlightEvidenceForQuestion(qi);
  }
  const exp=qbox.querySelector('.explanation');
  if(exp) exp.classList.add('show');
  qbox.classList.add('answered');
}

function shuffleChips(arr){
  const a=(arr||[]).slice();
  if(a.length<=1)return a;
  // Fisher-Yates; re-shuffle if result still matches original order
  for(let attempt=0; attempt<8; attempt++){
    for(let i=a.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      const t=a[i]; a[i]=a[j]; a[j]=t;
    }
    let same=true;
    for(let i=0;i<a.length;i++){ if(a[i]!==arr[i]){ same=false; break; } }
    if(!same) break;
  }
  return a;
}

  // shuffleChips expects values; for nodes do Fisher-Yates on array of nodes
  const nodes=chips.slice();
  for(let i=nodes.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));

  }
