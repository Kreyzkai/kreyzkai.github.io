<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>改訂版 COMET English Communication I ベーシックノート</title>
<style>
  /* =========================================================
     COMET 1 Basic Note – Interactive Textbook Edition
     Single-file HTML. No external deps. UTF-8.
     ========================================================= */
  :root{
    --zoom:1;
    --ink:#0d1a26;
    --ink-soft:#2b3d4f;
    --paper:#ffffff;
    --paper-warm:#fefefe;
    --cream:#f8fbff;
    --cyan:#0a4a5e;
    --cyan-soft:#e6eef6;
    --cyan-bar:#102a36;
    --rule:#9aa8b8;
    --rule-soft:#d2d9e2;
    --accent:#a83228;
    --good:#1d7a3a;
    --bad:#a83228;
    --shadow: 0 3px 10px rgba(0,0,0,0.14);
    --font-jp: "Hiragino Mincho ProN", "Yu Mincho", "MS Mincho", "Noto Serif JP", serif;
    --font-jp-sans: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", "Noto Sans JP", sans-serif;
    --font-en: "Georgia", "Times New Roman", "Noto Serif", serif;
    --font-ui: "Helvetica Neue", "Segoe UI", "Yu Gothic UI", sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#eef1f4;color:var(--ink);font-family:var(--font-ui);height:100%}
  body{overflow:hidden}

  /* ---------- Splash ---------- */
  #splash{
    position:fixed;inset:0;z-index:1000;
    background:radial-gradient(ellipse at top,#1c4b60,#0a2530);
    color:#fff;display:flex;align-items:center;justify-content:center;
    transition:opacity .5s;
  }
  #splash.hide{opacity:0;pointer-events:none}
  .splash-card{
    text-align:center;padding:48px 56px;max-width:640px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:16px;backdrop-filter:blur(6px);
  }
  .splash-brand{font-family:var(--font-en);font-weight:700;font-size:56px;letter-spacing:6px;margin:0}
  .splash-brand small{display:block;font-size:16px;letter-spacing:3px;font-weight:400;opacity:.85;margin-top:6px}
  .splash-jp{font-family:var(--font-jp);font-size:28px;margin:22px 0 8px;letter-spacing:.15em}
  .splash-sub{font-size:14px;opacity:.85;margin:0 0 28px}
  .splash-btn{
    background:#f5c14b;color:#1a2733;border:none;
    font-size:16px;font-weight:700;letter-spacing:.15em;
    padding:14px 36px;border-radius:999px;cursor:pointer;
    box-shadow:0 4px 12px rgba(0,0,0,.25);
    transition:transform .15s;
  }
  .splash-btn:hover{transform:translateY(-2px)}
  .splash-authors{font-size:12px;opacity:.7;margin-top:24px;letter-spacing:.05em}

  /* ---------- App shell ---------- */
  #app{display:grid;grid-template-columns:280px 1fr;height:100vh;transition:grid-template-columns .25s ease}
  #app.side-collapsed{grid-template-columns:0 1fr}
  #app.side-collapsed aside#sidebar{transform:translateX(-100%);pointer-events:none}
  aside#sidebar{
    background:#123846;color:#e6f2f6;overflow-y:auto;
    border-right:1px solid #082530;
    transition:transform .25s ease;
  }
  .side-collapse-btn{
    background:#123846;color:#fff;border:none;
    width:34px;height:34px;border-radius:8px;font-size:18px;cursor:pointer;
    flex-shrink:0;box-shadow:var(--shadow);
  }
  .side-collapse-btn:hover{filter:brightness(1.15)}

  /* Reveal (per-question) button */
  .reveal-btn{
    background:#eef3f8;color:#2b3d4f;border:1px solid #9aa8b8;
    font-family:var(--font-jp-sans);font-size:10.5px;font-weight:700;
    padding:1px 8px;border-radius:999px;cursor:pointer;
    margin-left:6px;vertical-align:middle;letter-spacing:.05em;
  }
  .reveal-btn:hover{background:#f5c14b;color:#1a2733;border-color:#c19a2a}
  .side-head{
    padding:20px 20px 14px;border-bottom:1px solid rgba(255,255,255,0.1);
  }
  .side-head .brand{font-family:var(--font-en);font-weight:700;font-size:22px;letter-spacing:3px}
  .side-head .brand small{display:block;font-size:11px;letter-spacing:2px;opacity:.7;font-weight:400}
  .side-head .brand-jp{font-family:var(--font-jp);font-size:14px;opacity:.85;margin-top:6px;letter-spacing:.1em}
  .toc{list-style:none;padding:12px 0;margin:0}
  .toc li{margin:0}
  .toc a{
    display:block;padding:11px 20px;color:#cfe3ea;text-decoration:none;
    font-size:14px;border-left:3px solid transparent;
    display:flex;align-items:center;gap:10px;
  }
  .toc a:hover{background:rgba(255,255,255,0.06)}
  .toc a.active{background:rgba(245,193,75,0.14);border-left-color:#f5c14b;color:#fff}
  .toc a .num{
    font-family:var(--font-en);font-weight:700;
    background:#f5c14b;color:#123846;
    width:26px;height:26px;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    font-size:12px;flex-shrink:0;
  }
  .toc a.active .num{background:#fff}
  .toc a .title-en{display:block;font-family:var(--font-en);font-weight:600;font-size:13.5px;line-height:1.25}
  .toc a .title-jp{display:block;font-family:var(--font-jp);font-size:11px;opacity:.75;margin-top:2px;letter-spacing:.05em}
  .toc a .col{display:flex;flex-direction:column;min-width:0}

  .side-foot{padding:14px 20px;font-size:11px;opacity:.6;border-top:1px solid rgba(255,255,255,0.1)}

  /* ---------- Main area ---------- */
  main#stage{
    position:relative;overflow-y:auto;
    background:
      linear-gradient(#f3f5f7,#e6eaef);
    padding:24px 24px 80px;
  }
  .topbar{
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    background:#fff;border:1px solid var(--rule);border-radius:10px;box-shadow:var(--shadow);
    padding:10px 16px;margin-bottom:18px;box-shadow:var(--shadow);
  }
  .topbar .crumb{
    font-family:var(--font-jp-sans);font-size:13px;color:var(--ink-soft);
    flex:1;min-width:200px;
  }
  .topbar .crumb b{color:var(--cyan);font-weight:700}
  .topbar .tabs{display:flex;gap:6px;flex-wrap:wrap}
  .tab{
    background:#eef3f8;color:#2b3d4f;border:1px solid #9aa8b8;
    padding:7px 14px;border-radius:999px;font-size:12.5px;cursor:pointer;
    font-family:var(--font-jp-sans);white-space:nowrap;
  }
  .tab:hover{background:#e6ecdd}
  .tab.active{background:#123846;color:#fff;border-color:#123846}
  .tab .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#c94a3c;margin-right:6px;opacity:0}
  .tab.done .dot{opacity:1;background:#2f8f4f}

  .zoom{display:flex;gap:8px;align-items:center;font-size:12.5px;color:var(--ink-soft);flex-wrap:wrap;line-height:1.2}
  .zoom button{
    background:none;border:1px solid transparent;border-radius:4px;cursor:pointer;
    font-family:var(--font-jp-sans);font-size:12px;font-weight:700;color:var(--cyan);
    padding:2px 8px;min-width:0;width:auto;height:auto;line-height:1.4;
    text-decoration:underline;text-underline-offset:2px;
  }
  .zoom button:hover{background:#eef1ea;border-color:#c8bfa8}
  #zoomLabel{font-family:var(--font-jp-sans);font-weight:700;color:var(--ink);margin:0 4px;min-width:7.5em;display:inline-block}

  /* ---------- Textbook page ---------- */
  .book{
    max-width:920px;margin:0 auto;background:var(--paper);
    box-shadow:0 4px 20px rgba(0,0,0,.15);
    border:1px solid #c8cfd9;
    border-radius:4px;overflow:visible;
    --zoom:1;
    /* text zoom, not box transform */
    transition:none;
  }
  .page{
    /* golden standard: zoom affects text size */
    font-size:calc(16px * var(--zoom, 1));
    transition:font-size .15s ease;
  }
  .page .honbun li,
  .page .honbun .en-row,
  .page .honbun .jp-answer,
  .page .ex-instr,
  .page .ex-list > li,
  .page .ex-list > li .en,
  .page .ex-list > li .jp,
  .page .cloze,
  .page .grammar-box,
  .page .grammar-box .example,
  .page .wordbank,
  .page .subsec {
    font-size:1em !important;
  }
  .page .honbun .n,
  .page .section-bar {
    font-size:0.9em !important;
  }
  .page{padding:34px 44px 44px;min-height:600px;position:relative}
  .page::before{
    content:attr(data-foot);position:absolute;bottom:14px;left:44px;
    font-family:var(--font-jp-sans);font-size:11px;color:#6b7280;letter-spacing:.1em;
  }
  .page::after{
    content:attr(data-page);position:absolute;bottom:14px;right:44px;
    font-family:var(--font-en);font-size:12px;color:#6b7280;font-weight:600;
  }

  /* ---- Lesson header ---- */
  .lesson-header{
    display:flex;align-items:center;gap:18px;margin-bottom:22px;
    border-bottom:2px solid #3a4a5c;padding-bottom:14px;
  }
  .lesson-badge{
    flex-shrink:0;width:78px;height:78px;border-radius:50%;
    background:#e8e2d1;color:#3a4a5c;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:var(--font-en);border:1px solid #c8cfd9;
  }
  .lesson-badge .lb1{font-size:11px;letter-spacing:.15em;margin-top:4px}
  .lesson-badge .lb2{font-family:var(--font-en);font-size:30px;font-weight:700;line-height:1;margin-top:-2px}
  .lesson-title{flex:1;min-width:0}
  .lesson-title .en{
    font-family:var(--font-en);font-weight:700;font-size:30px;color:#1a2733;
    line-height:1.15;margin:0 0 6px;
  }
  .lesson-title .em{font-style:italic}
  .kyoukasho{
    display:inline-block;background:#2b3d4f;color:#fff;
    font-family:var(--font-jp-sans);font-size:11px;
    padding:2px 8px;border-radius:3px;margin-right:8px;
  }
  .lesson-title .jp{
    font-family:var(--font-jp);font-size:15px;color:var(--ink-soft);
    letter-spacing:.05em;
  }

  /* ---- Section bar (cyan-ish black bar in the book) ---- */
  .section-bar{
    background:linear-gradient(#1c3a4a,#102530);
    color:#fff;
    border-radius:999px;
    padding:9px 22px;
    font-family:var(--font-jp-sans);font-size:14.5px;font-weight:700;
    display:inline-flex;align-items:center;gap:10px;
    margin:22px 0 14px;letter-spacing:.06em;
    box-shadow:0 2px 4px rgba(0,0,0,.15);
  }
  .section-bar .ico{
    width:22px;height:22px;background:#fff;color:#123846;
    border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:700;
  }

  .subsec{
    background:#eef1ea;border-radius:999px;
    padding:5px 16px;display:inline-block;
    font-family:var(--font-jp-sans);font-size:13px;font-weight:700;color:#1a2733;
    margin:14px 0 8px;
  }

  /* ---- Numbered main-text lines (本文) ---- */
  .honbun{list-style:none;padding:0;margin:0}
  .honbun li{
    display:flex;align-items:baseline;gap:12px;
    border-bottom:1px solid #d2d9e2;padding:12px 4px 14px;
    font-family:var(--font-en);font-size:1em !important;line-height:1.5;
  }
  .honbun .n{
    flex-shrink:0;font-family:var(--font-en);font-weight:700;
    width:26px;height:22px;border:1.5px solid #3a4a5c;border-radius:6px;
    display:inline-flex;align-items:center;justify-content:center;font-size:12px;color:#3a4a5c;
    background:#fff;
  }
  .honbun .txt{flex:1}
  /* underline = subject (solid) */
  .honbun u{text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:3px}
  /* dotted underline for extras */
  .honbun .du{border-bottom:1px dotted #3a4a5c;padding-bottom:1px}
  .honbun b{font-weight:700}
  .honbun em{font-style:italic}

  /* Translation-exercise honbun: click sentence to reveal Japanese translation */
  .honbun.translate li{
    flex-direction:column;align-items:stretch;gap:6px;cursor:pointer;
    transition:background .15s;
  }
  .honbun.translate li:hover{background:#fff8e8}
  .honbun.translate li .row{
    display:flex;align-items:baseline;gap:12px;
  }
  .honbun.translate .en-row{font-family:var(--font-en);font-size:1em !important;line-height:1.5;flex:1}
  .honbun.translate .jp-answer{
    display:none;font-family:var(--font-jp);font-size:0.95em !important;color:var(--cyan);
    background:#f0f7e0;border-left:3px solid #5a8a1a;border-radius:0 6px 6px 0;
    padding:8px 14px;margin:2px 0 0 38px;line-height:1.7;
  }
  .honbun.translate li.revealed .jp-answer{display:block}
  .translate-toolbar{
    display:flex;gap:10px;align-items:center;flex-wrap:wrap;
    margin:14px 0 6px;padding:8px 14px;
    background:#eef1ea;border:1px solid #c8bfa8;border-radius:8px;
    font-family:var(--font-jp-sans);font-size:0.85em !important;color:#3a4a5c;
  }
  .translate-toolbar .info{flex:1;min-width:200px}
  .translate-toolbar button{
    background:#123846;color:#fff;border:none;padding:6px 14px;border-radius:6px;
    font-family:var(--font-jp-sans);font-size:12px;font-weight:700;cursor:pointer;
  }
  .translate-toolbar button.secondary{background:#eef3f8;color:#2b3d4f;border:1px solid #9aa8b8}
  .translate-toolbar button.next-btn{background:#c94a3c;margin-left:auto}
  .translate-toolbar button:hover{filter:brightness(1.1)}

  /* (Date/WPM/QR head-side removed per instructor request) */

  /* ---- Vocab bank pill row (word bank) ---- */
  .wordbank{
    background:#fff;border:1.5px dashed #7a9ab5;border-radius:8px;
    padding:8px 14px;margin:10px auto;display:inline-block;
    font-family:var(--font-jp);font-size:14px;letter-spacing:.05em;
    color:#1a2733;
  }
  .wordbank.center{display:block;text-align:center;max-width:520px}
  .wordbank .sep{color:#6b8aa8;margin:0 8px}

  /* ---- Exercise blocks ---- */
  .ex{margin:10px 0 18px}
  .ex-num{
    display:inline-flex;align-items:center;justify-content:center;
    width:20px;height:20px;background:#2b3d4f;color:#fff;
    border-radius:4px;font-family:var(--font-en);font-weight:700;font-size:12px;
    margin-right:6px;vertical-align:-2px;
  }
  .ex-instr{
    font-family:var(--font-jp-sans);font-size:13.5px;color:#1a2733;
    margin:6px 0 10px;line-height:1.5;
  }
  .ex-list{list-style:none;padding:0;margin:6px 0 0}
  .ex-list > li{
    display:flex;align-items:baseline;gap:8px;padding:6px 0;
    font-family:var(--font-en);font-size:15px;line-height:1.6;
  }
  .ex-list > li .idx{
    font-family:var(--font-jp);font-size:12px;color:#3a4a5c;flex-shrink:0;min-width:20px;
  }
  .ex-list > li .jp{font-family:var(--font-jp);font-size:13.5px;color:#3a4a5c;min-width:230px;display:inline-block}
  .ex-list > li .en{font-family:var(--font-en);font-size:14.5px;color:#1a2733;flex:1}
  .ex-list.stack > li{flex-direction:column;align-items:flex-start;gap:2px;border-bottom:1px dotted #d0c8ae;padding:8px 0}
  .ex-list.stack > li .en{width:100%}
  .word-change-grid{display:grid;grid-template-columns:1.15fr 1fr 1fr auto;column-gap:22px;row-gap:10px;margin-top:8px;border-top:1px dotted #d0c8ae;padding-top:8px}
  .word-change-grid .wc-cell{font-family:var(--font-en);font-size:14.8px;color:#1a2733;white-space:nowrap}
  .word-change-grid .wc-cell.fixed{color:#25395b}
  .word-change-grid .wc-answer{display:inline-flex;align-items:center;gap:4px}
  .word-change-grid .fillin{min-width:122px}
  .word-change-grid .wc-wide .fillin{min-width:190px}
  @media (max-width:760px){.word-change-grid{grid-template-columns:1fr;row-gap:6px}.word-change-grid .reveal-btn{justify-self:start}}

  /* ---- Inputs / choices ---- */
  .fillin{
    display:inline-block;min-width:110px;
    border:none;border-bottom:1.5px solid #2b3d4f;
    background:transparent;font-family:var(--font-en);font-size:14.5px;
    padding:2px 4px;margin:0 3px;color:var(--cyan);
  }
  .fillin:focus{outline:none;background:#fff8d6;border-bottom-color:#c94a3c}
  .fillin.correct{background:#e2f4e6;border-bottom-color:#2f8f4f;color:#2f8f4f}
  .fillin.wrong{background:#fbe4e2;border-bottom-color:#c94a3c;color:#c94a3c}
  .fillin.short{min-width:70px}
  .fillin.long{min-width:170px}

  .choice{
    display:inline-flex;gap:0;border:1px solid #2b3d4f;border-radius:6px;overflow:hidden;
    margin:0 3px;vertical-align:-2px;
  }
  .choice button{
    background:#fff;border:none;padding:3px 10px;font-family:var(--font-en);font-size:13.5px;
    cursor:pointer;color:#1a2733;border-right:1px solid #c8bfa8;
  }
  .choice button:last-child{border-right:none}
  .choice button:hover{background:#f0ede4}
  .choice button.picked{background:#123846;color:#fff}
  .choice button.picked.correct{background:#2f8f4f}
  .choice button.picked.wrong{background:#c94a3c}

  .jp-choice{
    display:inline-flex;gap:0;border:1px solid #2b3d4f;border-radius:6px;overflow:hidden;margin:0 4px;
  }
  .jp-choice button{
    background:#fff;border:none;padding:2px 10px;font-family:var(--font-jp);font-size:13.5px;
    cursor:pointer;color:#1a2733;border-right:1px solid #c8bfa8;
  }
  .jp-choice button:last-child{border-right:none}
  .jp-choice button:hover{background:#f0ede4}
  .jp-choice button.picked{background:#123846;color:#fff}
  .jp-choice button.picked.correct{background:#2f8f4f}
  .jp-choice button.picked.wrong{background:#c94a3c}

  .letter-hint{
    display:inline-block;font-family:var(--font-en);font-style:italic;color:#3a4a5c;
    border-bottom:1.5px solid #3a4a5c;padding:0 4px 1px;min-width:10px;
  }
  .cloze-num{
    font-family:var(--font-en);font-size:10px;color:#3a4a5c;vertical-align:sub;margin-right:2px;
  }

  /* ---- Grammar formula box ---- */
  .grammar-box{
    background:#fff;border:1.5px solid #2b3d4f;border-radius:14px;
    padding:14px 20px;margin:10px 0 18px;position:relative;
  }
  .grammar-box .gtitle{
    font-family:var(--font-jp-sans);font-weight:700;color:#1a2733;
    font-size:14.5px;margin-bottom:10px;
  }
  .grammar-box .gtitle .term{
    color:#c94a3c;font-weight:700;margin-right:8px;
  }
  .grammar-box .rule{
    font-family:var(--font-jp);font-size:12.5px;color:#3a4a5c;
    text-align:right;margin-top:2px;
  }
  .grammar-box .pat{
    display:flex;flex-wrap:wrap;gap:8px;align-items:baseline;margin:8px 0;
    font-family:var(--font-en);font-size:14.5px;
  }
  .grammar-box .patlabel{
    display:inline-flex;align-items:center;justify-content:center;
    width:22px;height:22px;background:#1a2733;color:#fff;border-radius:50%;
    font-family:var(--font-en);font-size:12px;font-weight:700;flex-shrink:0;
  }
  .grammar-box .patdesc{font-family:var(--font-jp);color:#c94a3c;font-size:13px;font-weight:700}
  .grammar-box .example{font-family:var(--font-en);font-size:14px;margin:2px 0 4px 30px}
  .grammar-box .example .jp{color:#3a4a5c;font-family:var(--font-jp);font-size:12.5px;margin-left:12px}
  .grammar-table{
    display:grid;grid-template-columns:1fr 1fr 1.4fr;gap:0;
    border:1px solid #3a4a5c;border-radius:6px;overflow:hidden;
    font-family:var(--font-en);font-size:13px;margin:8px 0;
  }
  .grammar-table > div{padding:5px 10px;border-right:1px solid #c8bfa8;border-bottom:1px solid #c8bfa8;background:#fff;text-align:center}
  .grammar-table > div:nth-child(3n){border-right:none}
  .grammar-table > div.h{background:#f0ede4;font-weight:700;font-family:var(--font-jp-sans);font-size:12px}
  .gt-title{
    text-align:center;font-family:var(--font-jp-sans);font-size:12px;font-weight:700;
    background:#3a4a5c;color:#fff;padding:3px;margin:12px 0 0;border-radius:4px 4px 0 0;
    max-width:none;
  }
  .gt-split{
    display:grid;grid-template-columns:1fr 1.15fr;gap:0;
    border:1px solid #3a4a5c;border-top:none;border-radius:0 0 6px 6px;overflow:hidden;
    background:#fff;
  }
  .gt-left{display:grid;font-family:var(--font-en);font-size:13px;border-right:1px solid #3a4a5c}
  .gt-left > div{
    padding:5px 6px;border-right:1px solid #c8bfa8;border-bottom:1px solid #c8bfa8;
    text-align:center;background:#fff;
  }

  /* ---- Try box ---- */
  .try{
    background:#fff;border-left:5px solid #c94a3c;
    padding:12px 16px;margin:14px 0;border-radius:0 8px 8px 0;
  }

    display:inline-block;background:#c94a3c;color:#fff;

    padding:1px 10px;border-radius:999px;margin-right:8px;
  }
  .try .try-instr{font-family:var(--font-jp-sans);font-size:13px;color:#1a2733;margin:6px 0 10px}
  .try .dial{margin:6px 0;font-family:var(--font-en);font-size:14.5px}
  .try .dial .who{font-weight:700;margin-right:6px}
  .try .rightbank{
    float:right;border:1.5px dashed #8a9aab;border-radius:6px;
    padding:6px 12px;background:#fff;font-family:var(--font-en);font-size:13.5px;
    text-align:center;margin:0 0 8px 12px;
  }
  .clr{clear:both}

  /* Sample / example line under an ex-instr */
  .sample-line{
    background:#fff8e8;border:1px solid #e8dcb2;border-radius:6px;
    padding:6px 12px;margin:4px 0 10px;
    font-family:var(--font-jp-sans);font-size:12.5px;color:#5a4a20;
    display:flex;align-items:flex-start;gap:8px;
  }
  .sample-tag{
    background:#c94a3c;color:#fff;font-family:var(--font-jp-sans);font-size:11px;
    font-weight:700;padding:1px 8px;border-radius:3px;flex-shrink:0;
  }

  /* ---- Cloze passage ---- */
  .cloze{
    font-family:var(--font-en);font-size:15.5px;line-height:2.0;
    background:#fff;border:1px solid #d2d9e2;border-radius:8px;
    padding:22px 24px;color:#1a2733;text-indent:1.4em;
  }
  .cloze p{margin:0 0 12px;text-indent:1.4em}
  .cloze .fillin{min-width:120px}
  .kyou-p{
    background:#c94a3c;color:#fff;font-family:var(--font-jp-sans);
    display:inline-block;padding:2px 10px;border-radius:4px;font-size:12px;font-weight:700;
    margin-bottom:8px;
  }
  .kyou-p::before{content:"→ "}

  /* ---- Note area (メモ欄) ---- */
  .note-area{
    background:#fff;border:1px solid #d2d9e2;border-radius:8px;
    padding:14px 16px;margin-top:12px;
  }
  .note-area .note-head{
    font-family:var(--font-jp-sans);font-size:12px;color:#8a7f60;
    display:flex;align-items:center;gap:6px;margin-bottom:6px;
  }

    width:100%;min-height:140px;border:none;resize:vertical;
    font-family:var(--font-jp);font-size:14px;line-height:1.9;color:#1a2733;
    background:repeating-linear-gradient(#fff 0,#fff 27px,#e2dcc8 28px);
    outline:none;padding:2px 4px;
  }

  /* ---- Focus / open triangle for content ordering ---- */
  .diamond{color:#c94a3c;font-weight:700;margin-right:6px}

  /* ---- Action bar ---- */
  .actions{
    display:flex;gap:10px;margin:22px 0 0;flex-wrap:wrap;
    padding-top:16px;border-top:1px dashed #c8bfa8;
  }
  .btn{
    background:#123846;color:#fff;border:none;

  .btn:hover{filter:brightness(1.1)}
  .status{
    margin-left:auto;font-family:var(--font-jp-sans);font-size:13px;
    display:flex;align-items:center;gap:8px;
  }
  .status.good{color:#2f8f4f}
  .status.bad{color:#c94a3c}

  /* ---- 2-column layout (left main text, right vocab/content) ---- */
  .spread{display:grid;grid-template-columns:1.05fr 1fr;gap:26px;align-items:start}
  @media (max-width:840px){
    .spread{grid-template-columns:1fr}
  }

  /* ---- Sidebar toggle for mobile ---- */
  /* Old floating sidebar toggle superseded by topbar .side-collapse-btn */
  #sideToggle{display:none !important}
  @media (max-width:900px){
    #app{grid-template-columns:1fr}
    aside#sidebar{
      position:fixed;inset:0 auto 0 0;width:280px;z-index:50;
      transform:translateX(-100%);transition:transform .25s;
    }
    aside#sidebar.open{transform:translateX(0)}
    main#stage{padding:24px 12px 60px}
    .page{padding:22px 20px 40px}
    .lesson-title .en{font-size:22px}
  }

  /* Print helper */
  @media print{
    #splash,#sidebar,.topbar,.actions,#sideToggle{display:none!important}
    #app{grid-template-columns:1fr}
    main#stage{overflow:visible;background:#fff;padding:0}
    .book{box-shadow:none;border:none}
  }

  /* Focus visible */
  button:focus-visible,input:focus-visible,a:focus-visible{
    outline:2px solid #f5c14b;outline-offset:2px;
  }

  /* === CLEANUP ADDITIONS === */
  .fillin{font-size:1em !important;min-width:80px;max-width:100%;width:auto;transition:width .15s}
  .fillin.long{min-width:160px}
  .fillin.short{min-width:60px}
  .answer-wrap{display:inline-flex;align-items:center;gap:4px;max-width:100%;flex-wrap:wrap;vertical-align:baseline}
  .answer-wrap .fillin{flex:1 1 auto}
  .answer-wrap .reveal-btn{flex:0 0 auto}
  .reveal-btn{position:relative;z-index:2;white-space:nowrap}
  .choice,.jp-choice{max-width:100%;flex-wrap:wrap}
  .page{overflow-x:hidden;overflow-y:visible}
  .grammar-box .gtitle{font-size:13.5px;line-height:1.4}
  .grammar-box .example{font-size:13px;margin:2px 0 2px 20px;line-height:1.4}
  .grammar-box .patdesc{font-size:12px}
  .ex{margin:8px 0 12px}
  .ex-instr{font-size:13px;line-height:1.4}
  .ex-list.stack > li{padding:6px 0}
  .bottom-nav{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:16px 0 0;padding:12px 0 0;border-top:1px dashed #c8bfa8}
  .bottom-nav .spacer{flex:1}
  .translate-toolbar{position:relative;z-index:2}
  .cloze p{overflow:visible}
  .ex-list.vocab-list{list-style:none;padding:0;margin:6px 0 0}
  .ex-list.vocab-list > li{display:grid;grid-template-columns:28px minmax(90px,160px) 1fr auto;gap:6px 10px;align-items:center;padding:6px 0;border-bottom:1px dotted #d0c8ae}
  .ex-list.vocab-list > li .en{min-width:0 !important;font-family:var(--font-en);font-weight:700}
  .ex-list.vocab-list .answer-cell{display:inline-flex;align-items:center;gap:6px;flex-wrap:nowrap;justify-content:flex-start}
  .ex-list.vocab-list .answer-cell .answer-wrap{flex:0 1 auto}
  @media (max-width:600px){ .ex-list.vocab-list > li{grid-template-columns:28px 1fr; } .ex-list.vocab-list .answer-cell{grid-column:2 / span 2} }

/* =========================================================================
   STATE + TAB SYSTEM (dynamic per lesson)
   ========================================================================= */
const STATE = {
  currentLesson: null,
  currentTab: 0,
  zoom: 1.0,
  answers: {},
  results: {}
};

// Build the tab list for a given lesson. Each content part gets 2 tabs
// (text + vocab/content), then grammar, then cloze.
function tabsFor(L){
  const tabs = [];
  let idx = 1;
  L.parts.forEach((p, i)=>{
    const partSuf = L.parts.length>1 ? ` ${p.label}` : "";
    tabs.push({kind:"text",  partIdx:i, label:`${romanChar(idx++)} 本文${partSuf}`});
    tabs.push({kind:"vocab", partIdx:i, label:`${romanChar(idx++)} 単語・内容${partSuf}`});
  });
  if(L.grammar) tabs.push({kind:"grammar", label:`${romanChar(idx++)} 文法`});
  if(L.cloze)   tabs.push({kind:"cloze",   label:`${romanChar(idx++)} 本文確認`});
  return tabs;
}
function romanChar(n){
  const chars = ["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩","⑪","⑫"];
  return chars[n-1] || `(${n})`;
}

/* =========================================================================
   RENDER: sidebar TOC
   ========================================================================= */
function renderTOC(){
  const el = document.getElementById("toc");
  el.innerHTML = LESSONS.map(L=>{
    const enHtml = L.enItalic
      ? `<span style="font-style:italic">${escapeHtml(L.en.split(" ")[0])}</span> ${escapeHtml(L.en.split(" ").slice(1).join(" "))}`
      : escapeHtml(L.en);
    return `<li><a href="#" data-id="${L.id}" onclick="pickLesson('${L.id}');return false">
      <span class="num">${L.num}</span>
      <span class="col">
        <span class="title-en">${enHtml}</span>
        <span class="title-jp">${escapeHtml(L.jp)}</span>
      </span>
    </a></li>`;
  }).join("");
}

function pickLesson(id){
  STATE.currentLesson = id;
  STATE.currentTab = 0;
  document.querySelectorAll("#toc a").forEach(a=>a.classList.toggle("active", a.dataset.id===id));
  render();
  if(window.innerWidth<=900) document.getElementById("sidebar").classList.remove("open");
}

/* =========================================================================
   MAIN RENDER
   ========================================================================= */
function render(){
  const L = LESSONS.find(x=>x.id===STATE.currentLesson);
  const host = document.getElementById("pageHost");
  const crumb = document.getElementById("crumb");
  const tabsEl = document.getElementById("tabs");

  if(!L){
    crumb.innerHTML = "Lesson を選択してください";
    tabsEl.innerHTML = "";
    host.innerHTML = `
      <div class="book" style="--zoom:${STATE.zoom}">
        <div class="page" data-foot="COMET 1 Basic Note" data-page="—">
          <div style="text-align:center;padding:80px 20px;color:#8a7f60">
            <div style="font-family:var(--font-jp);font-size:22px;color:#3a4a5c;margin-bottom:8px">左のメニューからレッスンを選んでください</div>
            <div style="font-family:var(--font-en);font-size:14px">Select a lesson from the sidebar to begin.</div>
          </div>
        </div>
      </div>`;
    return;
  }

  crumb.innerHTML = `<b>Lesson ${L.num}</b> — ${L.enItalic?'<em>'+escapeHtml(L.en.split(" ")[0])+'</em> '+escapeHtml(L.en.split(" ").slice(1).join(" ")):escapeHtml(L.en)} &nbsp;·&nbsp; ${escapeHtml(L.jp)}`;

  const tabs = tabsFor(L);
  if(STATE.currentTab >= tabs.length) STATE.currentTab = 0;

  tabsEl.innerHTML = tabs.map((t,i)=>`
    <button class="tab ${i===STATE.currentTab?'active':''}" onclick="setTab(${i})">
      <span class="dot"></span>${escapeHtml(t.label)}
    </button>
  `).join("");

  const tab = tabs[STATE.currentTab];
  let body = "";
  if(tab.kind==="text")         body = renderText(L, tab.partIdx);
  else if(tab.kind==="vocab")   body = renderVocab(L, tab.partIdx);
  else if(tab.kind==="grammar") body = renderGrammar(L);
  else if(tab.kind==="cloze")   body = renderCloze(L);

  host.innerHTML = `<div class="book" style="--zoom:${STATE.zoom}">${body}</div>`;
  wireInteractions();
  if(typeof autoSizeInputs==='function') autoSizeInputs();
}

function setTab(i){ STATE.currentTab = i; render(); window.scrollTo({top:0, behavior:"smooth"}); }

/* Generic seiri renderer — handles items[], fills[], choices[], truefalse[], parts[], multi[], qa[], table, matchbox, table2, table2col, multiparts */
function renderSeiriGeneric(s, keyBase){
  let out = "";
  if(s.items){
    out += `<ul class="ex-list stack">${s.items.map((it,ii)=>`
      <li><span class="jp" style="font-weight:700">${escapeHtml(it.label||'')}</span>
        <span class="jp" style="min-width:0">${it.jpTemplate.map((seg,si)=>{
          if(seg.t) return escapeHtml(seg.t);
          const key = `${keyBase}.${ii}.${si}`;
          return `<span class="jp-choice" data-k="${key}" data-ans="${seg.ans}">${seg.choice.map((c,ci)=>`<button data-i="${ci}">${escapeHtml(c)}</button>`).join("")}</span>`;
        }).join(" ")}</span>
      </li>`).join("")}</ul>`;
  }
  if(s.fills){
    out += `<div style="font-family:var(--font-jp);font-size:14px;line-height:2;background:#fff;border:1px solid #e2dcc8;border-radius:6px;padding:12px 16px">${
      s.fills.map((f,fi)=>`${escapeHtml(f.pre)}<span class="answer-wrap"><input class="fillin" style="min-width:110px" data-k="${keyBase}.f${fi}" data-ans="${escapeHtml(f.ans)}"></span>${escapeHtml(f.post)}`).join("")
    }</div>`;
  }
  if(s.choices){
    out += `<div>${s.choices.map((c,i)=>`
      <div style="padding:4px 0;font-family:var(--font-en);font-size:14.5px">
        <label style="cursor:pointer">
          <input type="radio" name="${keyBase}_r" data-k="${keyBase}.r" data-ans="${s.ans}" data-i="${i}">
          ${escapeHtml(c)}
        </label>
      </div>`).join("")}</div>`;
  }
  if(s.truefalse){
    out += `<ul class="ex-list stack">${s.truefalse.map((t,ti)=>`
      <li>
        <div class="en" style="width:100%">${escapeHtml(t.t)}
          <span class="jp-choice" data-k="${keyBase}.tf.${ti}" data-ans="${t.ans==='○'?0:1}" style="margin-left:10px">
            <button data-i="0">○</button><button data-i="1">×</button>
          </span>
        </div>
      </li>`).join("")}</ul>`;
  }
  if(s.parts){
    out += `<div style="font-family:var(--font-en);font-size:14.5px;background:#fff;border:1px solid #e2dcc8;border-radius:6px;padding:12px 16px;line-height:2">
      ${renderParts(s.parts, `${keyBase}.p`)}
    </div>`;
  }
  if(s.multi){
    out += `<div style="background:#fff;border:1px solid #e2dcc8;border-radius:6px;padding:10px 14px">
      ${s.multi.map((m,mi)=>`
        <div style="padding:3px 0;font-family:var(--font-jp);font-size:13.5px">

              <span>${escapeHtml(m.label)}</span>
            </label>
          </div>`).join("")}</div>`:""}
      </div>`).join("");
  }
  if(s.table){
    // Multi-check table (Picture A/B style)
    out += `<div style="overflow-x:auto"><table class="ck-table">
      <thead><tr><th></th>${s.table.headers.map(h=>`<th>${escapeHtml(h)}</th>`).join("")}</tr></thead>
      <tbody>
        ${s.table.options.map((o,oi)=>`<tr>
          <td>${escapeHtml(o.label)}</td>
          ${s.table.headers.map(h=>`<td style="text-align:center">
            <input type="checkbox" data-k="${keyBase}.t.${oi}.${h}" data-ans="${o.cols.includes(h)?1:0}">
          </td>`).join("")}
        </tr>`).join("")}
      </tbody>
    </table></div>`;
  }
  if(s.matchbox){
    out += `<div style="display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start">
      <div style="flex:1;min-width:220px">
        ${s.matchbox.items.map((it,ii)=>`
          <div style="padding:6px 0;font-family:var(--font-en);font-size:14px">
            ${escapeHtml(it.label)} (
            <span class="choice" data-k="${keyBase}.mb.${ii}" data-ans="${['a','b','c','d','e'].indexOf(it.ans)}">
              ${s.matchbox.options.map((o,oi)=>`<button data-i="${oi}">${escapeHtml(o.k)}</button>`).join("")}
            </span>
            )
          </div>`).join("")}
      </div>
      <div style="border:1px solid #3a4a5c;padding:8px 12px;font-family:var(--font-en);font-size:13.5px;background:#fff;border-radius:6px">
        ${s.matchbox.options.map(o=>`<div>${escapeHtml(o.k)}. ${escapeHtml(o.v)}</div>`).join("")}
      </div>
    </div>`;
  }
  if(s.multiparts){
    out += `<ul class="ex-list stack">${s.multiparts.map((m,mi)=>`
      <li>
        <div class="en" style="width:100%"><span class="idx">${escapeHtml(m.label)}</span>${renderParts(m.parts, `${keyBase}.mp${mi}`)}</div>
      </li>`).join("")}</ul>`;
  }
  if(s.table2){
    out += `<table class="ck-table">
      <tbody>
        ${s.table2.rows.map((r,ri)=>`<tr>
          <th style="text-align:left">${escapeHtml(r.h)}</th>
          <td>${renderParts(r.parts, `${keyBase}.t2r${ri}`)}</td>

    </table>`;
  }
  if(s.table2col){
    out += `<div>
      ${s.table2col.options.map((o,oi)=>`<div style="padding:4px 0;font-family:var(--font-en);font-size:14px">

        </span>
      </div>`).join("")}
    </div>`;
  }
  return out;
}

/* ---- PDF-faithful word-change grid for comparison/superlative drills ---- */
function renderWordChangeGrid(L, ex){
  const rows = ex.n===1 ? [
    ["1) long — longer", ["short", "shorter"], ["new", "newer"]],
    ["2) nice — nicer", ["safe", "safer"], ["wise", "wiser"]],
    ["3) big — bigger", ["hot", "hotter"], ["sad", "sadder"]],
    ["4) easy — easier", ["busy", "busier"], ["happy", "happier"]],
    ["5) beautiful — more beautiful", ["careful", "more careful", true], null]
  ] : [
    ["1) long — the longest", ["short", "the shortest"], ["new", "the newest"]],
    ["2) nice — the nicest", ["safe", "the safest"], ["wise", "the wisest"]],
    ["3) big — the biggest", ["hot", "the hottest"], ["sad", "the saddest"]],
    ["4) easy — the easiest", ["busy", "the busiest"], ["happy", "the happiest"]],
    ["5) beautiful — the most beautiful", ["careful", "the most careful", true], null]
  ];
  const cell = (item, key) => {
    if(!item) return `<div class="wc-cell"></div>`;
    const wide = item[2] ? " wc-wide" : "";
    return `<div class="wc-cell${wide}"><span class="wc-answer">${escapeHtml(item[0])} — (<span class="answer-wrap"><input class="fillin" data-k="${key}" data-ans="${escapeHtml(item[1])}"></span>)</span></div>`;
  };
  return `<div class="word-change-grid">${rows.map((r,ri)=>`
    <div class="wc-cell fixed">${escapeHtml(r[0])}</div>
    ${cell(r[1], `${L.id}.g${ex.n}.r${ri}.a`)}
    ${cell(r[2], `${L.id}.g${ex.n}.r${ri}.b`)}
    <div>${revealBtn(`${L.id}.g${ex.n}.r${ri}`, true)}</div>
  `).join("")}</div>`;
}

/* =========================================================================
   PARTS RENDERER — turns [strings, {choice}, {i,ans}, {em}, {br}] into inline inputs
   ========================================================================= */
function renderParts(parts, keyBase){
  let inputIdx = 0, choiceIdx = 0;
  return parts.map(p=>{
    if(typeof p==="string") return escapeHtml(p);
    if(p.em) return `<em>${escapeHtml(p.em)}</em>`;
    if(p.br) return `<br>`;
    if(p.choice){
      const key = `${keyBase}.c${choiceIdx++}`;
      return `<span class="choice" data-k="${key}" data-ans="${p.ans}">${p.choice.map((c,ci)=>`<button data-i="${ci}">${escapeHtml(c)}</button>`).join("")}</span>`;
    }
    const key = `${keyBase}.i${inputIdx++}`;
    return `<span class="answer-wrap"><input class="fillin" data-k="${key}" data-ans="${escapeHtml(p.ans)}"></span>`;
  }).join("");
}

/* =========================================================================
   INTERACTIONS
   ========================================================================= */
function wireInteractions(){
  document.querySelectorAll("[data-k]").forEach(el=>{
    const k = el.dataset.k;
    const saved = STATE.answers[k];
    if(saved==null) return;
    if(el.tagName==="INPUT" && el.type==="checkbox"){
      el.checked = !!saved;
    } else if(el.tagName==="INPUT" && el.type!=="radio"){
      el.value = saved;
    } else if(el.tagName==="TEXTAREA"){
      el.value = saved;
    } else if(el.classList.contains("choice") || el.classList.contains("jp-choice")){
      el.querySelectorAll("button").forEach(b=>b.classList.toggle("picked", +b.dataset.i===+saved));
    } else if(el.type==="radio"){
      if(+el.dataset.i===+saved) el.checked = true;
    }
    if(STATE.results[k]==="correct" && el.tagName==="INPUT" && el.type!=="radio" && el.type!=="checkbox") el.classList.add("correct");
    if(STATE.results[k]==="wrong"   && el.tagName==="INPUT" && el.type!=="radio" && el.type!=="checkbox") el.classList.add("wrong");
  });

  document.querySelectorAll("input.fillin, textarea").forEach(el=>{
    el.addEventListener("input", ()=>{
      const k = el.dataset.k;
      STATE.answers[k] = el.value;
      el.classList.remove("correct","wrong");
      delete STATE.results[k];
    });
  });

  document.querySelectorAll("input[type=checkbox][data-k]").forEach(el=>{
    el.addEventListener("change", ()=>{
      STATE.answers[el.dataset.k] = el.checked ? 1 : 0;
      delete STATE.results[el.dataset.k];
    });
  });

  document.querySelectorAll(".choice, .jp-choice").forEach(el=>{
    el.querySelectorAll("button").forEach(b=>{
      b.addEventListener("click", ()=>{
        const idx = +b.dataset.i;
        const k = el.dataset.k;
        STATE.answers[k] = idx;
        el.querySelectorAll("button").forEach(bb=>bb.classList.remove("picked","correct","wrong"));
        b.classList.add("picked");
        delete STATE.results[k];
      });
    });
  });

  document.querySelectorAll('input[type=radio][data-k]').forEach(r=>{
    r.addEventListener("change", ()=>{
      STATE.answers[r.dataset.k] = +r.dataset.i;
    });
  });
}

function checkAnswers(){
  let total=0, ok=0;
  const seenRadio = {};
  document.querySelectorAll("[data-ans]").forEach(el=>{
    const k = el.dataset.k;
    const expected = el.dataset.ans;

    if(el.type==="radio"){
      // count once per radio group
      if(seenRadio[k]) return;
      seenRadio[k] = true;
      total++;
      const got = STATE.answers[k];
      const correct = String(got)===expected;
      if(correct) ok++;
      STATE.results[k] = correct?"correct":"wrong";
      return;
    }
    if(el.type==="checkbox"){
      total++;
      const got = STATE.answers[k]||0;
      const correct = String(got)===expected;
      el.style.outline = correct?"2px solid #2f8f4f":"2px solid #c94a3c";
      if(correct) ok++;
      STATE.results[k] = correct?"correct":"wrong";
      return;
    }
    total++;
    const got = STATE.answers[k];
    let correct = false;
    if(el.tagName==="INPUT"){
      correct = ansMatches(got||"", expected);
      el.classList.remove("correct","wrong");
      el.classList.add(correct?"correct":"wrong");
    } else if(el.classList.contains("choice") || el.classList.contains("jp-choice")){
      correct = String(got) === expected;
      el.querySelectorAll("button").forEach(b=>{
        b.classList.remove("correct","wrong");
        if(b.classList.contains("picked")) b.classList.add(correct?"correct":"wrong");
      });
    }
    STATE.results[k] = correct?"correct":"wrong";
    if(correct) ok++;
  });
  const status = document.querySelector(".status");
  if(status){
    status.classList.remove("good","bad");
    status.classList.add(ok===total?"good":"bad");
    status.textContent = ok===total ? `全問正解！ ${ok} / ${total}` : `${ok} / ${total} 正解`;
  }
  if(ok===total && total>0){
    const t = document.querySelectorAll(".tab")[STATE.currentTab];
    if(t) t.classList.add("done");
  }
}

function clearAnswers(){
  document.querySelectorAll("[data-k]").forEach(el=>{
    const k = el.dataset.k;
    delete STATE.answers[k];
    delete STATE.results[k];
    if(el.type==="checkbox"){ el.checked=false; el.style.outline=""; }
    else if(el.tagName==="INPUT" && el.type!=="radio"){ el.value=""; el.classList.remove("correct","wrong"); }
    else if(el.tagName==="TEXTAREA"){ el.value=""; }
    else if(el.type==="radio"){ el.checked=false; }
    else if(el.classList.contains("choice") || el.classList.contains("jp-choice")){
      el.querySelectorAll("button").forEach(b=>b.classList.remove("picked","correct","wrong"));
    }
  });
  const status = document.querySelector(".status");
  if(status){ status.textContent=""; status.classList.remove("good","bad"); }
}

/* Reveal answers for any data-k that starts with the given prefix (or matches exactly if groupPrefix=false) */
function revealPrefix(prefix, groupPrefix){
  const test = el => {
    const k = el.dataset.k;
    if(!k) return false;
    return groupPrefix ? (k===prefix || k.startsWith(prefix+".")) : k===prefix;
  };
  document.querySelectorAll("input.fillin[data-ans]").forEach(el=>{
    if(!test(el)) return;
    el.value = el.dataset.ans;
    el.classList.remove("wrong"); el.classList.add("correct");
    STATE.answers[el.dataset.k] = el.dataset.ans;
    STATE.results[el.dataset.k] = "correct";
  });
  document.querySelectorAll(".choice[data-ans], .jp-choice[data-ans]").forEach(el=>{
    if(!test(el)) return;
    const idx = +el.dataset.ans;
    el.querySelectorAll("button").forEach(b=>b.classList.remove("picked","correct","wrong"));
    const b = el.querySelector(`button[data-i="${idx}"]`);
    if(b){ b.classList.add("picked","correct"); }
    STATE.answers[el.dataset.k] = idx;
    STATE.results[el.dataset.k] = "correct";
  });
  document.querySelectorAll("input[type=checkbox][data-ans]").forEach(el=>{
    if(!test(el)) return;
    const want = el.dataset.ans==="1";
    el.checked = want;
    el.style.outline = "2px solid #2f8f4f";
    STATE.answers[el.dataset.k] = want?1:0;
    STATE.results[el.dataset.k] = "correct";
  });
  document.querySelectorAll("input[type=radio][data-ans]").forEach(el=>{
    if(!test(el)) return;
    if(String(el.dataset.i) === String(el.dataset.ans)){
      el.checked = true;
      STATE.answers[el.dataset.k] = +el.dataset.i;
      STATE.results[el.dataset.k] = "correct";
    }
  });
}

function showAnswers(){
  document.querySelectorAll("input.fillin[data-ans]").forEach(el=>{
    el.value = el.dataset.ans;
    el.classList.remove("wrong"); el.classList.add("correct");
    STATE.answers[el.dataset.k] = el.dataset.ans;
    STATE.results[el.dataset.k] = "correct";
  });
  document.querySelectorAll(".choice[data-ans], .jp-choice[data-ans]").forEach(el=>{
    const idx = +el.dataset.ans;
    el.querySelectorAll("button").forEach(b=>b.classList.remove("picked","correct","wrong"));
    const b = el.querySelector(`button[data-i="${idx}"]`);
    if(b){ b.classList.add("picked","correct"); }
    STATE.answers[el.dataset.k] = idx;
    STATE.results[el.dataset.k] = "correct";
  });
  document.querySelectorAll("input[type=checkbox][data-ans]").forEach(el=>{
    const want = el.dataset.ans==="1";
    el.checked = want;
    el.style.outline = "2px solid #2f8f4f";
    STATE.answers[el.dataset.k] = want?1:0;
    STATE.results[el.dataset.k] = "correct";
  });
}

function prevTab(){
  const L = LESSONS.find(x=>x.id===STATE.currentLesson);
  if(!L) return;
  if(STATE.currentTab>0){
    setTab(STATE.currentTab-1);
  } else {
    const idx = LESSONS.findIndex(l=>l.id===STATE.currentLesson);
    if(idx>0){
      const prevL = LESSONS[idx-1];
      const prevTabs = tabsFor(prevL);
      STATE.currentLesson = prevL.id;
      STATE.currentTab = prevTabs.length-1;
      document.querySelectorAll("#toc a").forEach(a=>a.classList.toggle("active", a.dataset.id===prevL.id));
      render();
      window.scrollTo({top:0, behavior:"smooth"});
    }
  }
}
function nextTab(){
  const L = LESSONS.find(x=>x.id===STATE.currentLesson);
  if(!L) return;
  const tabs = tabsFor(L);
  if(STATE.currentTab < tabs.length-1){ setTab(STATE.currentTab+1); }
  else {
    const idx = LESSONS.findIndex(l=>l.id===STATE.currentLesson);
    if(idx>=0 && idx<LESSONS.length-1){ pickLesson(LESSONS[idx+1].id); }
  }
}
function autoSizeInputs(){
  document.querySelectorAll('input.fillin[data-ans]').forEach(el=>{
    const ans = el.dataset.ans||'';
    const jpChars = (ans.match(/[\u3000-\u9FFF\u3040-\u309F\u30A0-\u30FF]/g)||[]).length;
    const enLen = ans.length - jpChars;
    // em based so it scales with text zoom
    const estEm = jpChars*1.05 + enLen*0.62 + 1.8;
    const clamped = Math.max(4.5, Math.min(20, estEm));
    el.style.width = clamped+'em';
    el.style.minWidth = '0';
  });
}

/* =========================================================================
   HELPERS
   ========================================================================= */
function renderActions(L){
  return `<div class="actions bottom-nav">
    <button class="btn secondary" onclick="prevTab()">‹ 前へ</button>
    <button class="btn" onclick="checkAnswers()">答え合わせ</button>
    <button class="btn secondary" onclick="clearAnswers()">クリア</button>
    <button class="btn secondary" onclick="showAnswers()">解答を表示</button>
    <span class="spacer"></span>
    <button class="btn warn" onclick="nextTab()">次へ ›</button>
    <div class="status" style="width:100%;margin-top:8px"></div>
  </div>`;
}
function pageLabel(L, ident){
  // Rough page ranges from the PDF
  const bases = {"01":2,"02":6,"03":10,"04":14,"05":20,"06":26,"07":32,"08":38,"09":44,"10":54};
  const b = bases[L.num];
  if(!b) return "—";
  if(typeof ident==="number") return `${b + ident*2}〜${b + ident*2 + 1}`;
  if(ident==="g"){
    // grammar page — after all content parts
    const off = L.parts.length*2;
    return `${b+off}`;
  }
  if(ident==="c"){
    const off = L.parts.length*2+1;
    return `${b+off}`;
  }
  return "—";
}
function normalize(s){
  return String(s).trim().toLowerCase()
    .replace(/[。、，．,\.\?!]/g," ")
    .replace(/[’‘`´]/g,"'")
    .replace(/[“”]/g,'"')
    .replace(/\s+/g," ")
    .replace(/\s*'\s*/g,"'")
    .trim();
}
function ansMatches(got, expected){
  const g = normalize(got), e = normalize(expected);
  if(g === e) return true;
  if(g.replace(/'/g,"") === e.replace(/'/g,"")) return true;
  return false;
}
function clozeDisplayNum(L, n){
  // Preserve the PDF's restarted blank numbering for each 教科書 page section,
  // while keeping the internal data keys unique for answer checking.
  if(!L || !L.id) return n;
  if((L.id==="L04" || L.id==="L05") && n>=5) return n-4;
  if((L.id==="L07" || L.id==="L08") && n>=6) return n-5;
  if(L.id==="L09"){
    if(n>=10) return n-9;
    if(n>=5) return n-4;
  }
  if(L.id==="L10"){
    if(n>=10) return n-9;
    if(n>=5) return n-4;
  }
  return n;
}
function itemHasPdfNumbering(text){
  // Some exercise prompts already include the PDF's printed item number (e.g. "1) ...").
  // Other lines, especially comparison/superlative continuation rows, intentionally begin with spaces
  // and should not receive an auto-generated number.
  return /^\s*(?:\d+\)|\s)/.test(text || "");
}
function escapeHtml(s){
  return String(s==null?"":s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

/* =========================================================================
   SIDEBAR TOGGLE
   ========================================================================= */
function toggleSidebar(){
  const app = document.getElementById("app");
  if(window.innerWidth<=900){
    // mobile: use existing off-canvas .open behavior
    document.getElementById("sidebar").classList.toggle("open");
  } else {
    app.classList.toggle("side-collapsed");
  }
}

/* =========================================================================
   ZOOM
   ========================================================================= */
function zoom(delta, reset){
  if(reset) STATE.zoom = 1.0;
  else STATE.zoom = Math.max(0.8, Math.min(1.6, STATE.zoom + delta));
  const pct = Math.round(STATE.zoom*100);
  // golden standard: set CSS variable --zoom which controls .page font-size (text, not box)
  document.documentElement.style.setProperty('--zoom', STATE.zoom);
  const label = document.getElementById('zoomLabel');
  if(label) label.textContent = 'ズーム: '+pct+'%';
  document.querySelectorAll('.book, .page').forEach(el=>{
    if(el) el.style.setProperty('--zoom', STATE.zoom);
  });
  if(typeof autoSizeInputs==='function') autoSizeInputs();
}

/* =========================================================================
   BOOT
   ========================================================================= */
document.addEventListener("DOMContentLoaded", ()=>{
  renderTOC();
  render();
  setTimeout(()=>{ zoom(0,true); }, 0);
  document.addEventListener("keydown", (e)=>{
    if(e.target.tagName==="INPUT" || e.target.tagName==="TEXTAREA") return;
    if(e.key==="ArrowRight") nextTab();
    if(e.key==="ArrowLeft" && STATE.currentTab>0){ setTab(STATE.currentTab-1); }
  });
});
</script>
