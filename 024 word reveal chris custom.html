<body>

<div class="app-header">

  <div>
    <h1>Click-to-Reveal Vocab · Generator</h1>

  </div>
</div>

<div class="wrap">

  <div class="card">

  </div>

Australia is a country of 1.                         . 2.                          people..."></textarea>
    <p class="hint">Each sentence becomes one slide. Paragraph line breaks also split slides.</p>
  </div>

  <div class="card">
    <h2>🗂 Word Bank</h2>
    <textarea id="wordbank-text" style="height:180px;" placeholder="1.	immigrants （移民）
2.	Aboriginal （アボリジニの）
3.	original inhabitants （先住民）
..."></textarea>

      <button class="btn btn-secondary" onclick="document.getElementById('rehydrate-input').click()">📂 Rehydrate from HTML</button>
      <input type="file" id="rehydrate-input" accept=".html" onchange="rehydrateGame(event)">
    </div>
  </div>

</div>

<!-- ═══════════════════════════════════════════════════════════
     PREVIEW MODAL
═══════════════════════════════════════════════════════════ -->
<div id="preview-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:12px;width:96vw;max-width:900px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.4);">

    </div>
    <iframe id="preview-frame" style="flex:1;border:none;width:100%;min-height:500px;"></iframe>
  </div>
</div>

<script>
// ══════════════════════════════════════
// PARSING
// ══════════════════════════════════════
function parseWordBank(raw) {
  const map = {};
  for (const line of raw.trim().split('\n')) {
    const m = line.match(/^(\d+)[.\s\t]+(.+)/);
    if (!m) continue;
    const num = parseInt(m[1]);
    const rest = m[2].trim();
    const jpMatch = rest.match(/^(.+?)\s*[（(](.+?)[）)]\s*$/);
    if (jpMatch) map[num] = { en: jpMatch[1].trim(), jp: jpMatch[2].trim() };
    else map[num] = { en: rest.trim(), jp: '' };
  }
  return map;
}

function splitSentences(text) {
  const sentences = [];
  for (const line of text.trim().split(/\n+/)) {
    if (!line.trim()) continue;
    // Split on sentence-ending punctuation NOT preceded by a digit+dot (blank markers)
    const parts = line.split(/(?<=[^0-9\s][\.\?\!])\s+(?=[A-Z0-9"])/);
    for (const p of parts) { if (p.trim()) sentences.push(p.trim()); }
  }
  return sentences;
}

function extractBlanks(sentence, wordBank) {
  const blanks = [];
  const re = /(\d+)\.\s{2,}/g;
  let m;
  while ((m = re.exec(sentence)) !== null) {
    const num = parseInt(m[1]);
    if (wordBank[num]) blanks.push({ num, ...wordBank[num] });
  }
  return blanks;
}

// ══════════════════════════════════════
// GENERATE / PREVIEW
// ══════════════════════════════════════
let gameData = null;

function generateGame() {
  const title   = document.getElementById('lesson-title').value.trim() || 'Vocabulary Game';
  const bodyRaw = document.getElementById('body-text').value.trim();
  const wbRaw   = document.getElementById('wordbank-text').value.trim();
  const errBox  = document.getElementById('parse-error');
  errBox.classList.remove('show');
  document.getElementById('btn-export').style.display = 'none';
  document.getElementById('preview-note').classList.remove('show');

  if (!bodyRaw || !wbRaw) { showErr('Please fill in both the lesson text and the word bank.'); return; }
  const wordBank = parseWordBank(wbRaw);
  if (!Object.keys(wordBank).length) { showErr('Could not parse word bank. Check the format.'); return; }
  const sentences = splitSentences(bodyRaw);
  if (!sentences.length) { showErr('Could not parse any sentences.'); return; }

  const slides = sentences.map(text => ({ text, blanks: extractBlanks(text, wordBank) }));
  gameData = { title, slides, wordBank };

  // show preview in iframe
  const html = buildStandaloneHTML(gameData);
  const blob = new Blob([html], { type: 'text/html' });
  document.getElementById('preview-frame').src = URL.createObjectURL(blob);
  document.getElementById('preview-overlay').style.display = 'flex';
  document.getElementById('btn-export').style.display = '';
  const note = document.getElementById('preview-note');
  note.textContent = `✔ Parsed ${slides.length} slides with ${Object.keys(wordBank).length} word bank entries. Preview opened — click "Export Standalone Game" to download.`;
  note.classList.add('show');
}

function closePreview() {
  document.getElementById('preview-overlay').style.display = 'none';
}

function exportGame() {
  if (!gameData) return;
  const html = buildStandaloneHTML(gameData);
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const safe = (gameData.title || 'vocab_game').replace(/[^a-zA-Z0-9_\-\s]/g,'').trim().replace(/\s+/g,'_').slice(0,40);
  a.download = `019_${safe}.html`;
  a.click();
}

// ══════════════════════════════════════
// REHYDRATE FROM EXPORTED HTML
// ══════════════════════════════════════
function rehydrateGame(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const html = e.target.result;
    const m = html.match(/<!--GAMEDATA:([\s\S]+?):GAMEDATA-->/);
    if (!m) { showErr('Could not find game data in this file. Make sure it was exported by this generator.'); return; }
    try {
      const data = JSON.parse(m[1]);
      document.getElementById('lesson-title').value = data.title || '';
      // Reconstruct body text from slides
      document.getElementById('body-text').value = data.slides.map(s => s.text).join('\n');
      // Reconstruct word bank
      const wbLines = Object.entries(data.wordBank)
        .sort((a,b) => parseInt(a[0]) - parseInt(b[0]))
        .map(([num, wb]) => `${num}.\t${wb.en}${wb.jp ? ' （' + wb.jp + '）' : ''}`);
      document.getElementById('wordbank-text').value = wbLines.join('\n');
      const note = document.getElementById('preview-note');
      note.textContent = `✔ Rehydrated "${data.title}" — ${data.slides.length} slides loaded. Hit Preview Game to continue.`;
      note.classList.add('show');
      document.getElementById('parse-error').classList.remove('show');
    } catch(err) { showErr('Failed to parse game data: ' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function showErr(msg) {
  const e = document.getElementById('parse-error');
  e.textContent = msg;
  e.classList.add('show');
}

// ══════════════════════════════════════
// BUILD STANDALONE HTML

function buildStandaloneHTML(data) {
  const jsonBlob = JSON.stringify(data).replace(/</g,'\\u003c').replace(/>/g,'\\u003e');
  return `<!DOCTYPE html>
<html lang="en">

<body class="scale-1">

<script>
const GD = ${jsonBlob};
let cur = 0;
const SIZES = ['28px','34px','40px','46px','22px'];
let sz = 0;

function init() {
  buildWB();
  renderSlide();
}

function buildWB() {
  const grid = document.getElementById('wb-grid');
  Object.entries(GD.wordBank).sort((a,b)=>parseInt(a[0])-parseInt(b[0])).forEach(([num,wb])=>{
    const d = document.createElement('div');
    d.className='wb-item';
    d.innerHTML='<span class=wb-num>'+num+'.</span><span class=wb-en>'+esc(wb.en)+'</span> <span class=wb-jp>'+(wb.jp?'（'+esc(wb.jp)+'）':'')+'</span>';
    grid.appendChild(d);
  });
}

function renderSlide() {
  const slide = GD.slides[cur];
  const total = GD.slides.length;
  document.getElementById('slide-ctr').textContent = 'Slide '+(cur+1)+' / '+total;

  let html = slide.text.replace(/(\\d+)\\.\\s{2,}/g,(match,n)=>{
    const num=parseInt(n);
    const wb=GD.wordBank[num];
    if(!wb) return match;
    const rev=!!(slide.revealed&&slide.revealed[num]);
    return '<span class="blank-chip'+(rev?' revealed':'')+'" data-num="'+num+'" onclick="toggle('+num+')">'
      +'<span class=num>'+num+'.</span>'
      +(rev?'<span class=en>'+esc(wb.en)+'</span>':'<span class=jp>'+esc(wb.jp)+'</span>')
      +'</span> ';
  });
  document.getElementById('sentence-card').innerHTML = html;

  document.getElementById('btn-prev').disabled = cur===0;
  document.getElementById('btn-next').disabled = cur===total-1;

  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML='';
  GD.slides.forEach((s,i)=>{
    const allDone = s.blanks.length>0 && s.blanks.every(b=>s.revealed&&s.revealed[b.num]);
    const d=document.createElement('div');
    d.className='dot'+(i===cur?' active':'')+(allDone?' done':'');
    d.title='Slide '+(i+1);
    d.onclick=()=>{cur=i;renderSlide();};
    dotsEl.appendChild(d);
  });
}

function toggle(num){
  const s=GD.slides[cur];
  if(!s.revealed) s.revealed={};
